<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Sales CRM · Pyxora Studio</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%23060610'/%3E%3Ctext x='50' y='72' font-family='sans-serif' font-size='68' font-weight='700' fill='%23fbbf24' text-anchor='middle'%3EP%3C/text%3E%3C/svg%3E"/>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&family=Space+Grotesk:wght@600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
a,button,.tab,.btn,[role=button]{touch-action:manipulation;-webkit-tap-highlight-color:transparent}
:root{--bg:#06060f;--bg-2:#0c0c1c;--surface:#13132a;--pyx:#fbbf24;--violet:#7c3aed;--cyan:#06b6d4;--green:#10b981;--red:#ef4444;--pink:#ec4899;--text:#f5f5f7;--text-2:#c4c4d0;--muted:#7a7a8c;--line:rgba(255,255,255,.08);--line-hi:rgba(255,255,255,.16)}
body{font-family:'Pretendard',sans-serif;background:var(--bg);color:var(--text);line-height:1.5;min-height:100vh;overflow-x:hidden}
a{color:inherit;text-decoration:none}
nav{position:sticky;top:0;z-index:50;padding:14px 28px;background:rgba(6,6,15,.9);backdrop-filter:blur(24px);border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between}
.nav-brand{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:14px;display:flex;align-items:center;gap:10px}
.nav-brand .dot{width:7px;height:7px;border-radius:50%;background:var(--pyx);box-shadow:0 0 10px var(--pyx)}
.nav-brand .studio{color:var(--muted);font-weight:400;margin-left:4px}
.nav-right{display:flex;gap:10px;align-items:center}
.badge-demo{font-family:'JetBrains Mono',monospace;font-size:9px;padding:4px 10px;background:rgba(168,85,247,.15);border:1px solid rgba(168,85,247,.4);border-radius:100px;color:#a855f7;letter-spacing:1px}
.btn{font-family:'JetBrains Mono',monospace;font-size:11px;padding:8px 14px;border:1px solid var(--line-hi);border-radius:100px;cursor:pointer;background:transparent;color:var(--text);transition:all .3s}
.btn:hover{background:var(--pyx);color:var(--bg);border-color:var(--pyx)}

.page-hd{padding:24px 32px;border-bottom:1px solid var(--line);background:rgba(12,12,28,.4);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:16px}
.page-hd h1{font-family:'Space Grotesk',sans-serif;font-size:26px;font-weight:700;letter-spacing:-.5px}
.page-hd p{font-size:12px;color:var(--text-2)}
.pipeline-stats{display:flex;gap:24px;font-family:'JetBrains Mono',monospace;font-size:11px}
.pipeline-stats .s{text-align:center}
.pipeline-stats .s-v{font-family:'Space Grotesk',sans-serif;font-size:20px;font-weight:700;color:var(--pyx)}
.pipeline-stats .s-l{font-size:9px;color:var(--muted);letter-spacing:1px}

.kanban{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;padding:24px 32px;min-height:calc(100vh - 200px)}
.col{background:rgba(12,12,28,.5);border:1px solid var(--line);border-radius:16px;padding:16px;display:flex;flex-direction:column}
.col-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid var(--line)}
.col-hd h3{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:1.2px;text-transform:uppercase;display:flex;align-items:center;gap:8px}
.col-hd h3::before{content:"";width:8px;height:8px;border-radius:50%;background:var(--col-color,var(--cyan))}
.col-hd .count{font-family:'JetBrains Mono',monospace;font-size:10px;background:rgba(255,255,255,.06);padding:3px 8px;border-radius:100px;color:var(--muted)}
.col-body{flex:1;display:flex;flex-direction:column;gap:10px;overflow-y:auto;max-height:calc(100vh - 280px)}

.card-lead{background:linear-gradient(180deg,var(--surface),var(--bg-2));border:1px solid var(--line);border-radius:12px;padding:14px;cursor:grab;transition:all .2s;position:relative}
.card-lead:hover{border-color:var(--line-hi);transform:translateY(-2px);box-shadow:0 10px 24px rgba(0,0,0,.4)}
.card-lead.drag{opacity:.4;cursor:grabbing}
.card-lead .company{font-weight:700;font-size:14px;margin-bottom:4px}
.card-lead .contact{font-size:11px;color:var(--muted);margin-bottom:10px;font-family:'JetBrains Mono',monospace}
.card-lead .amount{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;color:var(--pyx);margin-bottom:10px}
.card-lead .foot{display:flex;justify-content:space-between;align-items:center;padding-top:10px;border-top:1px solid var(--line);font-size:10px}
.card-lead .avatar{width:22px;height:22px;border-radius:50%;background:linear-gradient(135deg,var(--violet),var(--pink));display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff}
.card-lead .tag{font-family:'JetBrains Mono',monospace;font-size:9px;padding:2px 7px;border-radius:100px;letter-spacing:.3px}
.tag-hot{background:rgba(239,68,68,.15);color:var(--red)}
.tag-warm{background:rgba(251,191,36,.15);color:var(--pyx)}
.tag-cold{background:rgba(6,182,212,.15);color:var(--cyan)}

.col.drop-hover{background:rgba(124,58,237,.1);border-color:var(--violet)}

@media (max-width:1000px){.kanban{grid-template-columns:repeat(2,1fr)}}
@media (max-width:600px){.kanban{grid-template-columns:1fr;padding:16px}.page-hd{padding:16px}}
</style>
</head>
<body>

<nav>
  <a href="/projects/" class="nav-brand"><span class="dot"></span>PYXORA<span class="studio">CRM</span></a>
  <div class="nav-right"><span class="badge-demo">DEMO · FICTIONAL</span><a href="/projects/" class="btn">← PROJECTS</a></div>
</nav>

<div class="page-hd">
  <div>
    <h1>Sales Pipeline</h1>
    <p>B2B 영업 파이프라인 칸반 보드 · 드래그 앤 드롭으로 단계 이동</p>
  </div>
  <div class="pipeline-stats">
    <div class="s"><div class="s-v" id="stat-total">12</div><div class="s-l">TOTAL</div></div>
    <div class="s"><div class="s-v" id="stat-value">₩1.24B</div><div class="s-l">VALUE</div></div>
    <div class="s"><div class="s-v" id="stat-won">25%</div><div class="s-l">WIN RATE</div></div>
  </div>
</div>

<div class="kanban" id="kanban">
  <div class="col" data-stage="lead" style="--col-color:var(--cyan)">
    <div class="col-hd"><h3>리드</h3><span class="count">0</span></div>
    <div class="col-body"></div>
  </div>
  <div class="col" data-stage="meeting" style="--col-color:var(--pyx)">
    <div class="col-hd"><h3>상담</h3><span class="count">0</span></div>
    <div class="col-body"></div>
  </div>
  <div class="col" data-stage="proposal" style="--col-color:var(--violet)">
    <div class="col-hd"><h3>제안</h3><span class="count">0</span></div>
    <div class="col-body"></div>
  </div>
  <div class="col" data-stage="closed" style="--col-color:var(--green)">
    <div class="col-hd"><h3>계약</h3><span class="count">0</span></div>
    <div class="col-body"></div>
  </div>
</div>

<script>
const leads = [
  { id:1, company:'삼성SDS', contact:'김영수 이사', amount:120000000, stage:'lead', tag:'hot', rep:'JS' },
  { id:2, company:'네이버클라우드', contact:'이민호 팀장', amount:85000000, stage:'lead', tag:'warm', rep:'SM' },
  { id:3, company:'카카오엔터프라이즈', contact:'박지은 실장', amount:210000000, stage:'lead', tag:'hot', rep:'JS' },
  { id:4, company:'LG CNS', contact:'정우성 본부장', amount:180000000, stage:'meeting', tag:'warm', rep:'HK' },
  { id:5, company:'현대오토에버', contact:'최하늘 매니저', amount:95000000, stage:'meeting', tag:'warm', rep:'SM' },
  { id:6, company:'CJ올리브네트웍스', contact:'강민정 수석', amount:142000000, stage:'meeting', tag:'cold', rep:'JS' },
  { id:7, company:'SK C&C', contact:'윤도현 이사', amount:320000000, stage:'proposal', tag:'hot', rep:'HK' },
  { id:8, company:'한화시스템', contact:'임재훈 차장', amount:155000000, stage:'proposal', tag:'warm', rep:'SM' },
  { id:9, company:'신세계아이앤씨', contact:'조은별 과장', amount:68000000, stage:'proposal', tag:'cold', rep:'JS' },
  { id:10, company:'롯데정보통신', contact:'한지민 부장', amount:98000000, stage:'closed', tag:'hot', rep:'HK' },
  { id:11, company:'포스코ICT', contact:'노태환 상무', amount:175000000, stage:'closed', tag:'hot', rep:'SM' },
  { id:12, company:'동아ST', contact:'서수진 이사', amount:45000000, stage:'closed', tag:'warm', rep:'JS' },
];

function fmt(n){ return '₩' + (n/1000000).toFixed(0) + 'M'; }
const tagLabels = { hot:'HOT 🔥', warm:'WARM', cold:'COLD' };

function render(){
  document.querySelectorAll('.col').forEach(col => {
    const stage = col.dataset.stage;
    const body = col.querySelector('.col-body');
    const items = leads.filter(l => l.stage === stage);
    col.querySelector('.count').textContent = items.length;
    body.innerHTML = items.map(l => `
      <div class="card-lead" draggable="true" data-id="${l.id}">
        <div class="company">${l.company}</div>
        <div class="contact">${l.contact}</div>
        <div class="amount">${fmt(l.amount)}</div>
        <div class="foot">
          <span class="tag tag-${l.tag}">${tagLabels[l.tag]}</span>
          <span class="avatar">${l.rep}</span>
        </div>
      </div>
    `).join('');
  });

  // Stats
  document.getElementById('stat-total').textContent = leads.length;
  const total = leads.reduce((s,l) => s+l.amount, 0);
  document.getElementById('stat-value').textContent = '₩' + (total/1e9).toFixed(2) + 'B';
  const won = leads.filter(l => l.stage === 'closed').length;
  document.getElementById('stat-won').textContent = Math.round(won/leads.length*100) + '%';

  // Bind drag
  document.querySelectorAll('.card-lead').forEach(el => {
    el.ondragstart = e => { el.classList.add('drag'); e.dataTransfer.setData('text/plain', el.dataset.id); };
    el.ondragend = () => el.classList.remove('drag');
  });
}

document.querySelectorAll('.col').forEach(col => {
  col.ondragover = e => { e.preventDefault(); col.classList.add('drop-hover'); };
  col.ondragleave = () => col.classList.remove('drop-hover');
  col.ondrop = e => {
    e.preventDefault(); col.classList.remove('drop-hover');
    const id = +e.dataTransfer.getData('text/plain');
    const lead = leads.find(l => l.id === id);
    if (lead){ lead.stage = col.dataset.stage; render(); }
  };
});

render();
</script>
</body>
</html>
