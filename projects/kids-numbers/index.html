<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>숫자 따라쓰기 · Pyxora Kids</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%2306b6d4'/%3E%3Ctext x='50' y='78' font-size='72' font-weight='700' text-anchor='middle' fill='white'%3E1%3C/text%3E%3C/svg%3E"/>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@700;800&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
a,button,.tab,.btn,[role=button]{touch-action:manipulation;-webkit-tap-highlight-color:transparent}
body{font-family:'Pretendard',sans-serif;background:linear-gradient(180deg,#bfdbfe,#06b6d4,#0891b2);min-height:100vh;user-select:none;-webkit-user-select:none;touch-action:none;overflow-x:hidden}
a{color:inherit;text-decoration:none}
nav{padding:14px 20px;display:flex;align-items:center;justify-content:space-between;background:rgba(255,255,255,.3);backdrop-filter:blur(12px)}
.brand{font-weight:800;font-size:16px;color:#0c4a6e;display:flex;align-items:center;gap:8px}
.btn{background:#fff;color:#0c4a6e;border:none;padding:10px 18px;border-radius:100px;font-weight:700;font-size:13px;cursor:pointer;box-shadow:0 4px 12px rgba(0,0,0,.1)}

.game{max-width:520px;margin:20px auto;padding:0 20px;text-align:center}
h1{font-size:28px;font-weight:800;color:#0c4a6e;margin-bottom:16px}

.number-select{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin-bottom:20px}
.num-btn{width:48px;height:48px;background:rgba(255,255,255,.8);border:none;border-radius:14px;font-weight:800;font-size:20px;color:#0c4a6e;cursor:pointer;transition:all .2s;box-shadow:0 4px 10px rgba(0,0,0,.08)}
.num-btn.active{background:#fbbf24;color:#7c2d12;transform:scale(1.1)}
.num-btn.done{background:#10b981;color:#fff}

.canvas-wrap{background:#fff;border-radius:28px;padding:20px;box-shadow:0 20px 50px rgba(0,0,0,.15);position:relative;margin-bottom:16px}
svg{width:100%;height:auto;max-width:400px;display:block;margin:0 auto;touch-action:none}
.guide{fill:none;stroke:#e0f2fe;stroke-width:60;stroke-linecap:round;stroke-linejoin:round}
.trace{fill:none;stroke:#06b6d4;stroke-width:54;stroke-linecap:round;stroke-linejoin:round;opacity:0;transition:opacity .3s}
.number-label{font-family:'Space Grotesk',sans-serif;font-size:18px;font-weight:800;fill:#0c4a6e}
.user-path{fill:none;stroke:#fbbf24;stroke-width:14;stroke-linecap:round;stroke-linejoin:round;filter:drop-shadow(0 2px 6px rgba(251,191,36,.5))}

.actions{display:flex;gap:10px;justify-content:center}
.action-btn{background:#fff;color:#0c4a6e;border:none;padding:12px 20px;border-radius:100px;font-weight:700;font-size:13px;cursor:pointer;box-shadow:0 4px 12px rgba(0,0,0,.1)}

.success{position:fixed;inset:0;display:none;align-items:center;justify-content:center;background:rgba(255,255,255,.9);backdrop-filter:blur(8px);z-index:100}
.success.show{display:flex}
.success-box{background:#fff;border-radius:32px;padding:40px;text-align:center;box-shadow:0 30px 60px rgba(0,0,0,.2);animation:pop .5s}
@keyframes pop{from{transform:scale(.5);opacity:0}to{transform:scale(1);opacity:1}}
.success-box .emoji{font-size:80px;animation:bounce 1s infinite}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-15px)}}
.success-box h2{font-size:32px;color:#0c4a6e;margin:10px 0}
.success-box p{color:#0369a1;margin-bottom:20px}
.success-box button{background:#06b6d4;color:#fff;border:none;padding:14px 28px;border-radius:100px;font-weight:700;font-size:14px;cursor:pointer}
</style>
</head>
<body>

<nav>
  <div class="brand">🔢 Pyxora Kids</div>
  <a href="/projects/" class="btn">← 나가기</a>
</nav>

<div class="game">
  <h1>숫자를 따라 써보세요!</h1>

  <div class="number-select" id="numSelect"></div>

  <div class="canvas-wrap">
    <svg id="svg" viewBox="0 0 400 400">
      <path class="guide" id="guide"/>
      <path class="trace" id="trace"/>
      <text class="number-label" x="20" y="35" id="label">1</text>
      <g id="userStrokes"></g>
    </svg>
  </div>

  <div class="actions">
    <button class="action-btn" id="clearBtn">🔄 다시</button>
    <button class="action-btn" id="nextBtn">다음 숫자 →</button>
  </div>
</div>

<div class="success" id="success">
  <div class="success-box">
    <div class="emoji">🌟</div>
    <h2 id="okText">잘했어요!</h2>
    <p>다음 숫자도 해볼까요?</p>
    <button id="okBtn">계속하기</button>
  </div>
</div>

<script>
// SVG paths for digits 1-10 (simplified strokes)
const paths = {
  1: 'M 170 100 L 200 80 L 200 320',
  2: 'M 130 140 Q 200 60 260 140 Q 280 180 200 240 Q 140 280 120 320 L 280 320',
  3: 'M 130 120 Q 200 60 270 140 Q 280 180 200 200 Q 280 220 270 260 Q 200 340 130 280',
  4: 'M 240 320 L 240 80 L 110 240 L 290 240',
  5: 'M 260 80 L 130 80 L 130 200 Q 200 160 260 200 Q 300 260 260 310 Q 200 340 130 310',
  6: 'M 280 100 Q 200 80 150 180 Q 120 260 170 310 Q 240 340 280 280 Q 290 220 240 200 Q 180 200 150 240',
  7: 'M 110 100 L 290 100 L 170 320',
  8: 'M 200 80 Q 130 100 140 170 Q 150 200 200 200 Q 280 220 280 280 Q 250 340 200 320 Q 130 300 130 240 Q 140 200 200 200 Q 260 180 270 120 Q 250 80 200 80',
  9: 'M 280 200 Q 270 120 200 100 Q 130 120 130 180 Q 140 240 200 240 Q 270 240 280 200 L 220 320',
  10: 'M 90 100 L 120 80 L 120 320 M 250 80 Q 170 120 180 200 Q 190 310 260 310 Q 320 280 310 200 Q 300 80 250 80'
};

let currentNum = 1;
let drawing = false;
let currentPath = '';
let completed = new Set();

function buildNumSelect(){
  const sel = document.getElementById('numSelect');
  sel.innerHTML = '';
  for (let i = 1; i <= 10; i++){
    const b = document.createElement('button');
    b.className = 'num-btn' + (i === currentNum ? ' active' : '') + (completed.has(i) ? ' done' : '');
    b.textContent = i;
    b.onclick = () => { currentNum = i; load(); buildNumSelect(); };
    sel.appendChild(b);
  }
}

function load(){
  document.getElementById('guide').setAttribute('d', paths[currentNum]);
  document.getElementById('trace').setAttribute('d', paths[currentNum]);
  document.getElementById('label').textContent = currentNum;
  document.getElementById('userStrokes').innerHTML = '';
  document.getElementById('trace').style.opacity = '0';
}

const svg = document.getElementById('svg');

function getPos(e){
  const pt = svg.createSVGPoint();
  const t = e.touches ? e.touches[0] : e;
  pt.x = t.clientX; pt.y = t.clientY;
  return pt.matrixTransform(svg.getScreenCTM().inverse());
}

function start(e){ drawing = true; const p = getPos(e); currentPath = `M ${p.x} ${p.y}`; addPath(); }
function mid(e){ if (!drawing) return; e.preventDefault(); const p = getPos(e); currentPath += ` L ${p.x} ${p.y}`; updatePath(); }
function end(){ drawing = false; checkDone(); }

function addPath(){
  const path = document.createElementNS('http://www.w3.org/2000/svg','path');
  path.setAttribute('class','user-path');
  path.setAttribute('d', currentPath);
  path.id = 'current';
  document.getElementById('userStrokes').appendChild(path);
}
function updatePath(){
  const p = document.getElementById('current');
  if (p) p.setAttribute('d', currentPath);
}

function checkDone(){
  // Simplified: just length check
  const userPaths = document.querySelectorAll('.user-path');
  let total = 0;
  userPaths.forEach(p => total += p.getTotalLength());
  if (total > 400){
    completed.add(currentNum);
    document.getElementById('trace').style.opacity = '1';
    setTimeout(() => {
      document.getElementById('success').classList.add('show');
      playSuccessSound();
    }, 400);
    buildNumSelect();
  }
}

svg.addEventListener('mousedown', start);
svg.addEventListener('mousemove', mid);
svg.addEventListener('mouseup', end);
svg.addEventListener('mouseleave', end);
svg.addEventListener('touchstart', e => { e.preventDefault(); start(e); });
svg.addEventListener('touchmove', mid, {passive:false});
svg.addEventListener('touchend', end);

document.getElementById('clearBtn').onclick = load;
document.getElementById('nextBtn').onclick = () => { currentNum = currentNum === 10 ? 1 : currentNum + 1; load(); buildNumSelect(); };
document.getElementById('okBtn').onclick = () => { document.getElementById('success').classList.remove('show'); currentNum = currentNum === 10 ? 1 : currentNum + 1; load(); buildNumSelect(); };

function playSuccessSound(){
  try {
    const ctx = new (window.AudioContext||window.webkitAudioContext)();
    [523,659,784,1047].forEach((f,i) => setTimeout(() => {
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.frequency.value = f; o.type = 'sine';
      g.gain.setValueAtTime(0.2, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
      o.start(); o.stop(ctx.currentTime+0.3);
    }, i*120));
  } catch(e){}
}

buildNumSelect();
load();
</script>
</body>
</html>
