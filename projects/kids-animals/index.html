<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>동물 소리 · Pyxora Kids</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%2310b981'/%3E%3Ctext x='50' y='78' font-size='64' text-anchor='middle'%3E🦁%3C/text%3E%3C/svg%3E"/>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
a,button,.tab,.btn,[role=button]{touch-action:manipulation;-webkit-tap-highlight-color:transparent}
body{font-family:'Pretendard',sans-serif;background:linear-gradient(180deg,#bbf7d0,#10b981,#059669);min-height:100vh;user-select:none;-webkit-user-select:none}
a{color:inherit;text-decoration:none}
nav{padding:14px 20px;display:flex;align-items:center;justify-content:space-between;background:rgba(255,255,255,.3);backdrop-filter:blur(12px)}
.brand{font-weight:800;font-size:16px;color:#14532d;display:flex;align-items:center;gap:8px}
.btn{background:#fff;color:#14532d;border:none;padding:10px 18px;border-radius:100px;font-weight:700;font-size:13px;cursor:pointer;box-shadow:0 4px 12px rgba(0,0,0,.1)}

.game{max-width:900px;margin:20px auto;padding:0 20px;text-align:center}
h1{font-size:30px;font-weight:800;color:#14532d;margin-bottom:6px}
.sub{color:#166534;margin-bottom:24px;font-size:14px}

.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:16px}
.animal{background:#fff;border-radius:24px;padding:24px 16px;cursor:pointer;transition:all .3s;box-shadow:0 10px 24px rgba(0,0,0,.1);border:3px solid transparent}
.animal:hover,.animal:active{transform:translateY(-6px) scale(1.05);border-color:#fbbf24;box-shadow:0 20px 40px rgba(0,0,0,.15)}
.animal.playing{animation:shake .5s;border-color:#fbbf24;background:#fef3c7}
@keyframes shake{0%,100%{transform:rotate(0)}25%{transform:rotate(-5deg)}75%{transform:rotate(5deg)}}
.animal .emoji{font-size:64px;display:block;margin-bottom:10px}
.animal .name{font-size:18px;font-weight:800;color:#14532d;margin-bottom:2px}
.animal .eng{font-size:11px;color:#15803d;letter-spacing:.5px;font-weight:600}

.info{background:rgba(255,255,255,.85);border-radius:16px;padding:14px 20px;margin-top:20px;font-size:13px;color:#14532d;backdrop-filter:blur(8px)}
</style>
</head>
<body>

<nav>
  <div class="brand">🦁 Pyxora Kids</div>
  <a href="/projects/" class="btn">← 나가기</a>
</nav>

<div class="game">
  <h1>동물을 누르면 소리가 나요!</h1>
  <p class="sub">12가지 동물 · 이름 읽어주기</p>

  <div class="grid" id="grid"></div>

  <div class="info">🔊 소리가 나지 않으면 화면을 한 번 눌러주세요 (모바일 정책)</div>
</div>

<script>
const animals = [
  { emoji:'🦁', name:'사자', eng:'LION', freq:80, wave:'sawtooth', length:0.8 },
  { emoji:'🐘', name:'코끼리', eng:'ELEPHANT', freq:60, wave:'sawtooth', length:1.0 },
  { emoji:'🐶', name:'강아지', eng:'DOG', freq:300, wave:'square', length:0.4 },
  { emoji:'🐱', name:'고양이', eng:'CAT', freq:500, wave:'sine', length:0.6 },
  { emoji:'🐄', name:'소', eng:'COW', freq:120, wave:'triangle', length:1.0 },
  { emoji:'🐷', name:'돼지', eng:'PIG', freq:200, wave:'square', length:0.5 },
  { emoji:'🐸', name:'개구리', eng:'FROG', freq:180, wave:'square', length:0.3 },
  { emoji:'🐓', name:'닭', eng:'ROOSTER', freq:700, wave:'square', length:0.6 },
  { emoji:'🦆', name:'오리', eng:'DUCK', freq:400, wave:'square', length:0.5 },
  { emoji:'🐑', name:'양', eng:'SHEEP', freq:300, wave:'sawtooth', length:0.8 },
  { emoji:'🐴', name:'말', eng:'HORSE', freq:200, wave:'sawtooth', length:0.7 },
  { emoji:'🦉', name:'부엉이', eng:'OWL', freq:350, wave:'sine', length:0.9 },
];

const grid = document.getElementById('grid');
animals.forEach((a, i) => {
  const el = document.createElement('div');
  el.className = 'animal';
  el.innerHTML = `<span class="emoji">${a.emoji}</span><div class="name">${a.name}</div><div class="eng">${a.eng}</div>`;
  el.onclick = () => playAnimal(a, el);
  grid.appendChild(el);
});

let audioCtx = null;
function getCtx(){ if (!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)(); return audioCtx; }

function playAnimal(a, el){
  el.classList.add('playing');
  setTimeout(() => el.classList.remove('playing'), 500);

  try {
    const ctx = getCtx();
    // Sound effect (synthesized)
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    const filter = ctx.createBiquadFilter();
    osc.connect(filter); filter.connect(gain); gain.connect(ctx.destination);
    osc.type = a.wave;
    osc.frequency.setValueAtTime(a.freq, ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(a.freq * 1.5, ctx.currentTime + a.length * 0.3);
    osc.frequency.exponentialRampToValueAtTime(a.freq * 0.8, ctx.currentTime + a.length);
    filter.type = 'lowpass';
    filter.frequency.value = a.freq * 8;
    gain.gain.setValueAtTime(0.2, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + a.length);
    osc.start();
    osc.stop(ctx.currentTime + a.length);
  } catch(e){}

  // Speech
  if ('speechSynthesis' in window){
    setTimeout(() => {
      const u = new SpeechSynthesisUtterance(a.name);
      u.lang = 'ko-KR';
      u.rate = 0.9;
      u.pitch = 1.1;
      speechSynthesis.speak(u);
    }, 300);
  }
}
</script>
</body>
</html>
