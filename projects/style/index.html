<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Style Transfer · Pyxora Studio</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%23060610'/%3E%3Ctext x='50' y='72' font-family='sans-serif' font-size='68' font-weight='700' fill='%23fbbf24' text-anchor='middle'%3EP%3C/text%3E%3C/svg%3E"/>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;800&family=Space+Grotesk:wght@600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#06060f;--surface:#13132a;--pyx:#fbbf24;--violet:#7c3aed;--cyan:#06b6d4;--pink:#ec4899;--green:#10b981;--text:#f5f5f7;--text-2:#c4c4d0;--muted:#7a7a8c;--line:rgba(255,255,255,.08);--line-hi:rgba(255,255,255,.16)}
body{font-family:'Pretendard',sans-serif;background:var(--bg);color:var(--text);line-height:1.5;min-height:100vh}
body::before{content:"";position:fixed;inset:0;z-index:0;pointer-events:none;background:radial-gradient(ellipse 60% 40% at 50% 0%,rgba(16,185,129,.15),transparent 60%)}
a{color:inherit;text-decoration:none}
nav{position:sticky;top:0;z-index:50;padding:16px 32px;background:rgba(6,6,15,.85);backdrop-filter:blur(24px);border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between}
.nav-brand{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:14px;display:flex;align-items:center;gap:10px}
.nav-brand .dot{width:7px;height:7px;border-radius:50%;background:var(--pyx);box-shadow:0 0 10px var(--pyx)}
.nav-brand .studio{color:var(--muted);font-weight:400;margin-left:4px}
.btn{font-family:'JetBrains Mono',monospace;font-size:11px;padding:10px 16px;border:1px solid var(--line-hi);border-radius:100px;cursor:pointer;background:transparent;color:var(--text);transition:all .3s}
.btn:hover{background:var(--pyx);color:var(--bg);border-color:var(--pyx)}

.container{max-width:1100px;margin:0 auto;padding:50px 24px;position:relative;z-index:2}
h1{font-family:'Space Grotesk',sans-serif;font-size:42px;font-weight:800;letter-spacing:-1px;text-align:center;margin-bottom:10px;background:linear-gradient(135deg,var(--green),var(--cyan),var(--violet));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.sub{text-align:center;color:var(--text-2);margin-bottom:32px;font-size:14px}

.upload{background:var(--surface);border:2px dashed var(--line-hi);border-radius:20px;padding:40px 20px;text-align:center;cursor:pointer;margin-bottom:20px;transition:all .3s}
.upload:hover,.upload.drag{border-color:var(--green);background:rgba(16,185,129,.06)}
.upload .icon{font-size:48px;margin-bottom:10px}
.upload input{display:none}

.workspace{display:none;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px}
.workspace.show{display:grid}
.canvas-box{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:16px;text-align:center}
.canvas-box h4{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:1.5px;margin-bottom:10px;text-transform:uppercase}
.canvas-box canvas{max-width:100%;max-height:380px;border-radius:10px;background:#000}

.styles{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:24px}
.styles.hidden{display:none}
.style-btn{background:rgba(255,255,255,.03);border:1px solid var(--line);border-radius:12px;padding:14px 12px;cursor:pointer;transition:all .3s;text-align:center}
.style-btn:hover{background:rgba(124,58,237,.1);border-color:var(--violet);transform:translateY(-2px)}
.style-btn.active{background:var(--violet);border-color:var(--violet);color:#fff}
.style-btn .e{font-size:28px;display:block;margin-bottom:4px}
.style-btn .n{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.5px}

.actions{text-align:center;margin-top:12px;display:none;gap:10px;justify-content:center}
.actions.show{display:flex}

@media (max-width:780px){.workspace.show{grid-template-columns:1fr}.container{padding:30px 16px}h1{font-size:32px}}
</style>
</head>
<body>

<nav>
  <a href="/projects/" class="nav-brand"><span class="dot"></span>PYXORA<span class="studio">STYLE</span></a>
  <a href="/projects/" class="btn">← PROJECTS</a>
</nav>

<div class="container">
  <h1>Style Transfer 🎨</h1>
  <p class="sub">사진을 업로드하면 다양한 예술 스타일로 변환합니다. 실시간 · 로컬 처리.</p>

  <label class="upload" id="zone">
    <div class="icon">🖼</div>
    <div style="font-size:16px;font-weight:700;margin-bottom:4px">사진 업로드</div>
    <div style="font-size:11px;color:var(--muted);font-family:'JetBrains Mono',monospace">CLICK or DRAG</div>
    <input type="file" id="file" accept="image/*"/>
  </label>

  <div class="styles hidden" id="styles">
    <div class="style-btn active" data-s="original"><span class="e">📷</span><span class="n">원본</span></div>
    <div class="style-btn" data-s="grayscale"><span class="e">⚪</span><span class="n">흑백</span></div>
    <div class="style-btn" data-s="sepia"><span class="e">📜</span><span class="n">세피아</span></div>
    <div class="style-btn" data-s="vintage"><span class="e">🎞</span><span class="n">빈티지</span></div>
    <div class="style-btn" data-s="oil"><span class="e">🖌</span><span class="n">유화</span></div>
    <div class="style-btn" data-s="watercolor"><span class="e">🎨</span><span class="n">수채화</span></div>
    <div class="style-btn" data-s="pixel"><span class="e">🟦</span><span class="n">픽셀</span></div>
    <div class="style-btn" data-s="neon"><span class="e">💡</span><span class="n">네온</span></div>
    <div class="style-btn" data-s="posterize"><span class="e">🎭</span><span class="n">포스터</span></div>
    <div class="style-btn" data-s="sketch"><span class="e">✏️</span><span class="n">스케치</span></div>
  </div>

  <div class="workspace" id="workspace">
    <div class="canvas-box">
      <h4>원본</h4>
      <canvas id="src"></canvas>
    </div>
    <div class="canvas-box">
      <h4>변환 결과</h4>
      <canvas id="dst"></canvas>
    </div>
  </div>

  <div class="actions" id="actions">
    <button class="btn" id="downloadBtn">💾 다운로드</button>
    <button class="btn" id="resetBtn">🔄 다시 선택</button>
  </div>
</div>

<script>
const $ = id => document.getElementById(id);
let origData = null;
let currentStyle = 'original';

$('file').onchange = e => { if (e.target.files[0]) loadFile(e.target.files[0]); };
$('zone').ondragover = e => { e.preventDefault(); $('zone').classList.add('drag'); };
$('zone').ondragleave = () => $('zone').classList.remove('drag');
$('zone').ondrop = e => { e.preventDefault(); $('zone').classList.remove('drag'); if (e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0]); };

function loadFile(f){
  const img = new Image();
  img.onload = () => {
    const src = $('src'), dst = $('dst');
    const maxW = 420, scale = Math.min(1, maxW/img.width);
    src.width = dst.width = img.width * scale;
    src.height = dst.height = img.height * scale;
    src.getContext('2d').drawImage(img, 0, 0, src.width, src.height);
    origData = src.getContext('2d').getImageData(0, 0, src.width, src.height);
    $('workspace').classList.add('show');
    $('styles').classList.remove('hidden');
    $('actions').classList.add('show');
    $('zone').style.display = 'none';
    applyStyle('original');
  };
  img.src = URL.createObjectURL(f);
}

function cloneData(data){ const c = new ImageData(new Uint8ClampedArray(data.data), data.width, data.height); return c; }

const filters = {
  original: d => d,
  grayscale: d => { const p = d.data; for (let i=0;i<p.length;i+=4){ const g = 0.299*p[i]+0.587*p[i+1]+0.114*p[i+2]; p[i]=p[i+1]=p[i+2]=g; } return d; },
  sepia: d => { const p = d.data; for (let i=0;i<p.length;i+=4){ const r=p[i],g=p[i+1],b=p[i+2]; p[i]=Math.min(255,0.393*r+0.769*g+0.189*b); p[i+1]=Math.min(255,0.349*r+0.686*g+0.168*b); p[i+2]=Math.min(255,0.272*r+0.534*g+0.131*b); } return d; },
  vintage: d => { const p = d.data; for (let i=0;i<p.length;i+=4){ p[i]=Math.min(255,p[i]*1.1+20); p[i+1]=Math.min(255,p[i+1]*0.95+10); p[i+2]=Math.min(255,p[i+2]*0.8); } return d; },
  oil: d => {
    // Simplified oil paint: color quantization + box blur
    const p = d.data, w = d.width, h = d.height;
    for (let i=0;i<p.length;i+=4){ for (let k=0;k<3;k++) p[i+k] = Math.round(p[i+k]/32)*32; }
    // Small box blur
    const copy = new Uint8ClampedArray(p);
    for (let y=1;y<h-1;y++){
      for (let x=1;x<w-1;x++){
        for (let k=0;k<3;k++){
          let s=0,c=0;
          for (let dy=-1;dy<=1;dy++) for (let dx=-1;dx<=1;dx++){
            s += copy[((y+dy)*w + (x+dx))*4 + k]; c++;
          }
          p[(y*w+x)*4+k] = s/c;
        }
      }
    }
    return d;
  },
  watercolor: d => {
    const p = d.data;
    for (let i=0;i<p.length;i+=4){
      p[i] = Math.min(255, p[i]*0.85+40);
      p[i+1] = Math.min(255, p[i+1]*0.85+45);
      p[i+2] = Math.min(255, p[i+2]*0.85+50);
      for (let k=0;k<3;k++) p[i+k] = Math.round(p[i+k]/16)*16;
    }
    return d;
  },
  pixel: d => {
    const p = d.data, w = d.width, h = d.height, block = 8;
    for (let y=0;y<h;y+=block){
      for (let x=0;x<w;x+=block){
        let r=0,g=0,b=0,c=0;
        for (let dy=0;dy<block&&y+dy<h;dy++) for (let dx=0;dx<block&&x+dx<w;dx++){
          const i = ((y+dy)*w + (x+dx))*4;
          r+=p[i]; g+=p[i+1]; b+=p[i+2]; c++;
        }
        r/=c; g/=c; b/=c;
        for (let dy=0;dy<block&&y+dy<h;dy++) for (let dx=0;dx<block&&x+dx<w;dx++){
          const i = ((y+dy)*w + (x+dx))*4;
          p[i]=r; p[i+1]=g; p[i+2]=b;
        }
      }
    }
    return d;
  },
  neon: d => {
    const p = d.data;
    for (let i=0;i<p.length;i+=4){
      p[i] = Math.min(255, Math.pow(p[i]/255, 0.6)*255 + 30);
      p[i+1] = Math.min(255, Math.pow(p[i+1]/255, 0.7)*255);
      p[i+2] = Math.min(255, Math.pow(p[i+2]/255, 0.5)*255 + 60);
    }
    return d;
  },
  posterize: d => { const p = d.data, levels = 4, step = 255/(levels-1); for (let i=0;i<p.length;i+=4){ for (let k=0;k<3;k++) p[i+k] = Math.round(p[i+k]/step)*step; } return d; },
  sketch: d => {
    const p = d.data, w = d.width, h = d.height;
    // Grayscale first
    const gray = new Float32Array(w*h);
    for (let i=0;i<p.length;i+=4) gray[i/4] = 0.299*p[i]+0.587*p[i+1]+0.114*p[i+2];
    // Edge detect (simplified Sobel)
    for (let y=1;y<h-1;y++){
      for (let x=1;x<w-1;x++){
        const gx = -gray[(y-1)*w+(x-1)] - 2*gray[y*w+(x-1)] - gray[(y+1)*w+(x-1)] + gray[(y-1)*w+(x+1)] + 2*gray[y*w+(x+1)] + gray[(y+1)*w+(x+1)];
        const gy = -gray[(y-1)*w+(x-1)] - 2*gray[(y-1)*w+x] - gray[(y-1)*w+(x+1)] + gray[(y+1)*w+(x-1)] + 2*gray[(y+1)*w+x] + gray[(y+1)*w+(x+1)];
        const m = Math.min(255, Math.sqrt(gx*gx+gy*gy));
        const v = 255 - m;
        const i = (y*w+x)*4;
        p[i]=p[i+1]=p[i+2]=v;
      }
    }
    return d;
  }
};

function applyStyle(name){
  currentStyle = name;
  const dst = $('dst');
  const ctx = dst.getContext('2d');
  const data = cloneData(origData);
  filters[name](data);
  ctx.putImageData(data, 0, 0);
  document.querySelectorAll('.style-btn').forEach(b => b.classList.toggle('active', b.dataset.s === name));
}

document.querySelectorAll('.style-btn').forEach(b => {
  b.onclick = () => applyStyle(b.dataset.s);
});

$('downloadBtn').onclick = () => {
  const a = document.createElement('a');
  a.download = `pyxora-${currentStyle}-${Date.now()}.png`;
  a.href = $('dst').toDataURL('image/png');
  a.click();
};

$('resetBtn').onclick = () => {
  $('workspace').classList.remove('show');
  $('styles').classList.add('hidden');
  $('actions').classList.remove('show');
  $('zone').style.display = 'block';
  $('file').value = '';
};
</script>
</body>
</html>
