<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Purchase System · Pyxora Studio</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%23060610'/%3E%3Ctext x='50' y='72' font-family='sans-serif' font-size='68' font-weight='700' fill='%23fbbf24' text-anchor='middle'%3EP%3C/text%3E%3C/svg%3E"/>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&family=Space+Grotesk:wght@600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
a,button,.tab,.btn,[role=button]{touch-action:manipulation;-webkit-tap-highlight-color:transparent}
:root{--bg:#06060f;--bg-2:#0c0c1c;--surface:#13132a;--pyx:#fbbf24;--violet:#7c3aed;--violet-2:#a855f7;--cyan:#06b6d4;--green:#10b981;--red:#ef4444;--text:#f5f5f7;--text-2:#c4c4d0;--muted:#7a7a8c;--line:rgba(255,255,255,.08);--line-hi:rgba(255,255,255,.16)}
body{font-family:'Pretendard',sans-serif;background:var(--bg);color:var(--text);line-height:1.5;min-height:100vh}
a{color:inherit;text-decoration:none}
nav{position:sticky;top:0;z-index:50;padding:14px 28px;background:rgba(6,6,15,.9);backdrop-filter:blur(24px);border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between}
.nav-brand{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:14px;display:flex;align-items:center;gap:10px}
.nav-brand .dot{width:7px;height:7px;border-radius:50%;background:var(--pyx);box-shadow:0 0 10px var(--pyx)}
.nav-brand .studio{color:var(--muted);font-weight:400;margin-left:4px}
.nav-right{display:flex;gap:10px;align-items:center}
.badge-demo{font-family:'JetBrains Mono',monospace;font-size:9px;padding:4px 10px;background:rgba(168,85,247,.15);border:1px solid rgba(168,85,247,.4);border-radius:100px;color:var(--violet-2);letter-spacing:1px}
.btn{font-family:'JetBrains Mono',monospace;font-size:11px;padding:8px 14px;border:1px solid var(--line-hi);border-radius:100px;cursor:pointer;background:transparent;color:var(--text);transition:all .3s}
.btn:hover{background:var(--pyx);color:var(--bg);border-color:var(--pyx)}

main{max-width:1280px;margin:0 auto;padding:28px 32px}
.page-hd{margin-bottom:24px}
.page-hd h1{font-family:'Space Grotesk',sans-serif;font-size:26px;font-weight:700;letter-spacing:-.5px;margin-bottom:4px}
.page-hd p{font-size:12px;color:var(--text-2)}

.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:24px}
.kpi{background:linear-gradient(180deg,var(--surface),var(--bg-2));border:1px solid var(--line);border-radius:16px;padding:18px 20px;position:relative;overflow:hidden}
.kpi::before{content:"";position:absolute;top:0;left:0;right:0;height:2px;background:var(--c,var(--violet))}
.kpi .l{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px}
.kpi .v{font-family:'Space Grotesk',sans-serif;font-size:24px;font-weight:700}

.panel{background:linear-gradient(180deg,var(--surface),var(--bg-2));border:1px solid var(--line);border-radius:16px;padding:22px;margin-bottom:16px}
.panel h3{font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:600;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center}

/* PO Table */
.po-table{width:100%;border-collapse:collapse;font-size:12px}
.po-table th{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--muted);text-align:left;padding:10px 8px;border-bottom:1px solid var(--line);letter-spacing:.5px;text-transform:uppercase}
.po-table td{padding:12px 8px;border-bottom:1px solid var(--line);color:var(--text-2)}
.po-table tr{cursor:pointer;transition:background .2s}
.po-table tr:hover td{background:rgba(124,58,237,.08);color:var(--text)}
.po-table tr.selected td{background:rgba(124,58,237,.15);color:var(--text)}
.po-num{font-family:'JetBrains Mono',monospace;color:var(--pyx);font-weight:700}
.po-amt{font-family:'JetBrains Mono',monospace;text-align:right;color:var(--pyx)}
.st-badge{font-family:'JetBrains Mono',monospace;font-size:9px;padding:3px 8px;border-radius:100px;letter-spacing:.5px}
.st-draft{background:rgba(100,116,139,.15);color:#94a3b8}
.st-pend{background:rgba(251,191,36,.15);color:var(--pyx)}
.st-appr{background:rgba(16,185,129,.15);color:var(--green)}
.st-rej{background:rgba(239,68,68,.15);color:var(--red)}

/* Workflow steps */
.workflow{display:flex;gap:8px;margin-top:20px;flex-wrap:wrap;align-items:center}
.step{flex:1;min-width:120px;background:rgba(255,255,255,.03);border:1px solid var(--line);border-radius:12px;padding:14px;text-align:center;position:relative}
.step.done{background:rgba(16,185,129,.1);border-color:rgba(16,185,129,.3)}
.step.current{background:rgba(251,191,36,.1);border-color:rgba(251,191,36,.4);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(251,191,36,.4)}50%{box-shadow:0 0 0 6px rgba(251,191,36,0)}}
.step.pending{background:rgba(255,255,255,.02);opacity:.6}
.step .idx{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);margin-bottom:4px}
.step .t{font-size:12px;font-weight:700;color:var(--text);margin-bottom:2px}
.step .w{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace}
.step .check{font-size:14px;margin-top:4px}
.step.done .check{color:var(--green)}
.step.current .check{color:var(--pyx)}

.arrow{color:var(--muted);font-size:14px;align-self:center;flex:0}

@media (max-width:800px){main{padding:16px}.workflow{flex-direction:column}.arrow{display:none}.step{width:100%}}
</style>
</head>
<body>

<nav>
  <a href="/projects/" class="nav-brand"><span class="dot"></span>PYXORA<span class="studio">PURCHASE</span></a>
  <div class="nav-right"><span class="badge-demo">DEMO · FICTIONAL</span><a href="/projects/" class="btn">← PROJECTS</a></div>
</nav>

<main>
  <div class="page-hd">
    <h1>구매 관리 시스템</h1>
    <p>PR → PO → 승인 → 입고 워크플로우 · Pyxora Commerce</p>
  </div>

  <div class="kpis">
    <div class="kpi" style="--c:var(--pyx)"><div class="l">이번 달 PO</div><div class="v">42건</div></div>
    <div class="kpi" style="--c:var(--green)"><div class="l">승인 완료</div><div class="v">28건</div></div>
    <div class="kpi" style="--c:var(--pyx)"><div class="l">대기 중</div><div class="v">11건</div></div>
    <div class="kpi" style="--c:var(--violet)"><div class="l">총 구매액</div><div class="v">₩428M</div></div>
  </div>

  <div class="panel">
    <h3>최근 구매 요청서 (PR/PO)</h3>
    <table class="po-table">
      <thead><tr><th>번호</th><th>품목</th><th>부서</th><th>요청자</th><th>금액</th><th>상태</th></tr></thead>
      <tbody id="poBody"></tbody>
    </table>
  </div>

  <div class="panel" id="wfPanel">
    <h3>결재 흐름 <span id="wfTitle" style="font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);font-weight:400">PO-2026-042 선택됨</span></h3>
    <div class="workflow" id="workflow"></div>
  </div>
</main>

<script>
const pos = [
  { id:'PO-2026-042', item:'서버 하드웨어 10대', dept:'엔지니어링', req:'박지훈', amt:45000000, st:'pend', wfStep:2 },
  { id:'PO-2026-041', item:'마케팅 캠페인 광고비', dept:'마케팅', req:'최유진', amt:28000000, st:'appr', wfStep:5 },
  { id:'PO-2026-040', item:'사무용 가구 일체', dept:'경영지원', req:'한지민', amt:12000000, st:'appr', wfStep:5 },
  { id:'PO-2026-039', item:'디자인 소프트웨어 라이선스', dept:'디자인', req:'윤소영', amt:8500000, st:'pend', wfStep:3 },
  { id:'PO-2026-038', item:'클라우드 인프라 월 구독', dept:'엔지니어링', req:'강민호', amt:15000000, st:'appr', wfStep:5 },
  { id:'PO-2026-037', item:'영업팀 출장 경비', dept:'영업', req:'이서연', amt:6800000, st:'draft', wfStep:1 },
  { id:'PO-2026-036', item:'보안 컨설팅 용역', dept:'엔지니어링', req:'서태원', amt:22000000, st:'rej', wfStep:3 },
  { id:'PO-2026-035', item:'전사 워크샵 행사비', dept:'경영지원', req:'정하늘', amt:18000000, st:'pend', wfStep:4 },
];

const stBadge = { draft:['DRAFT','draft'], pend:['PENDING','pend'], appr:['APPROVED','appr'], rej:['REJECTED','rej'] };
const stLabels = { draft:'작성중', pend:'결재중', appr:'승인완료', rej:'반려' };

document.getElementById('poBody').innerHTML = pos.map(p => `
  <tr data-id="${p.id}" onclick="selectPO('${p.id}')">
    <td><span class="po-num">${p.id}</span></td>
    <td>${p.item}</td>
    <td>${p.dept}</td>
    <td>${p.req}</td>
    <td class="po-amt">₩${p.amt.toLocaleString()}</td>
    <td><span class="st-badge st-${p.st}">${stLabels[p.st]}</span></td>
  </tr>
`).join('');

const wfSteps = [
  { idx:'01', t:'작성', w:'요청자' },
  { idx:'02', t:'팀장 승인', w:'부서 리더' },
  { idx:'03', t:'부서장 승인', w:'부서 임원' },
  { idx:'04', t:'CFO 승인', w:'재무 책임' },
  { idx:'05', t:'입고/완료', w:'구매팀' },
];

function renderWorkflow(po){
  const current = po.wfStep;
  const rejected = po.st === 'rej';
  const el = document.getElementById('workflow');
  el.innerHTML = wfSteps.map((s, i) => {
    let cls = 'pending', mark = '';
    const stepNum = i + 1;
    if (rejected && stepNum === current){ cls = 'pending'; mark = '✗'; el.querySelector }
    else if (stepNum < current || (po.st === 'appr' && stepNum <= current)){ cls = 'done'; mark = '✓'; }
    else if (stepNum === current && !rejected){ cls = 'current'; mark = '⏳'; }
    return `<div class="step ${cls}">
      <div class="idx">${s.idx}</div>
      <div class="t">${s.t}</div>
      <div class="w">${s.w}</div>
      <div class="check">${mark}</div>
    </div>` + (i < wfSteps.length-1 ? '<div class="arrow">→</div>' : '');
  }).join('');
  document.getElementById('wfTitle').textContent = `${po.id} · ${po.item}`;
}

window.selectPO = (id) => {
  document.querySelectorAll('.po-table tr').forEach(tr => tr.classList.remove('selected'));
  const tr = document.querySelector(`[data-id="${id}"]`);
  if (tr) tr.classList.add('selected');
  const po = pos.find(p => p.id === id);
  if (po) renderWorkflow(po);
};

renderWorkflow(pos[0]);
selectPO(pos[0].id);
</script>
</body>
</html>
