<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>GitHub Analyzer · Pyxora Studio</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%23060610'/%3E%3Ctext x='50' y='72' font-family='sans-serif' font-size='68' font-weight='700' fill='%23fbbf24' text-anchor='middle'%3EP%3C/text%3E%3C/svg%3E"/>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&family=Space+Grotesk:wght@600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
a,button,.tab,.btn,[role=button]{touch-action:manipulation;-webkit-tap-highlight-color:transparent}
:root{--bg:#06060f;--bg-2:#0c0c1c;--surface:#13132a;--pyx:#fbbf24;--violet:#7c3aed;--cyan:#06b6d4;--green:#10b981;--text:#f5f5f7;--text-2:#c4c4d0;--muted:#7a7a8c;--line:rgba(255,255,255,.08);--line-hi:rgba(255,255,255,.16)}
body{font-family:'Pretendard',sans-serif;background:var(--bg);color:var(--text);line-height:1.5;min-height:100vh}
a{color:inherit;text-decoration:none}
nav{position:sticky;top:0;z-index:50;padding:14px 28px;background:rgba(6,6,15,.9);backdrop-filter:blur(24px);border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between}
.nav-brand{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:14px;display:flex;align-items:center;gap:10px}
.nav-brand .dot{width:7px;height:7px;border-radius:50%;background:var(--pyx);box-shadow:0 0 10px var(--pyx)}
.nav-brand .studio{color:var(--muted);font-weight:400;margin-left:4px}
.btn{font-family:'JetBrains Mono',monospace;font-size:11px;padding:8px 14px;border:1px solid var(--line-hi);border-radius:100px;cursor:pointer;background:transparent;color:var(--text);transition:all .3s}
.btn:hover{background:var(--pyx);color:var(--bg);border-color:var(--pyx)}

main{max-width:1100px;margin:0 auto;padding:32px}
.page-hd h1{font-family:'Space Grotesk',sans-serif;font-size:30px;font-weight:700;letter-spacing:-.5px;margin-bottom:4px}
.page-hd p{font-size:13px;color:var(--text-2);margin-bottom:20px}

.search-bar{display:flex;gap:10px;margin-bottom:24px}
.search-bar input{flex:1;background:var(--surface);border:1px solid var(--line-hi);border-radius:12px;padding:14px 18px;color:var(--text);font-family:'Pretendard',sans-serif;font-size:14px;outline:none}
.search-bar input:focus{border-color:var(--violet)}
.search-bar button{background:var(--pyx);color:#000;border:none;padding:14px 24px;border-radius:12px;font-family:'JetBrains Mono',monospace;font-weight:700;font-size:11px;cursor:pointer;letter-spacing:1px}

.profile{display:none;background:linear-gradient(180deg,var(--surface),var(--bg-2));border:1px solid var(--line-hi);border-radius:16px;padding:28px;margin-bottom:16px;gap:20px;align-items:center}
.profile.show{display:flex}
.profile img{width:100px;height:100px;border-radius:50%;border:3px solid var(--line-hi)}
.profile .info{flex:1;min-width:0}
.profile .name{font-family:'Space Grotesk',sans-serif;font-size:24px;font-weight:700;margin-bottom:4px}
.profile .login{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--muted);margin-bottom:8px}
.profile .bio{font-size:13px;color:var(--text-2);margin-bottom:10px}
.profile .meta{display:flex;gap:20px;font-family:'JetBrains Mono',monospace;font-size:11px;flex-wrap:wrap}
.profile .meta .m{color:var(--muted)}
.profile .meta .v{color:var(--pyx);font-weight:700}

.kpis{display:none;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:16px}
.kpis.show{display:grid}
.kpi{background:linear-gradient(180deg,var(--surface),var(--bg-2));border:1px solid var(--line);border-radius:14px;padding:16px 18px}
.kpi .l{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:1px;margin-bottom:6px}
.kpi .v{font-family:'Space Grotesk',sans-serif;font-size:26px;font-weight:700;color:var(--pyx)}

.panel{display:none;background:linear-gradient(180deg,var(--surface),var(--bg-2));border:1px solid var(--line);border-radius:16px;padding:24px;margin-bottom:16px}
.panel.show{display:block}
.panel h3{font-family:'Space Grotesk',sans-serif;font-size:16px;margin-bottom:14px}

/* Repos */
.repo{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--line)}
.repo:last-child{border-bottom:none}
.repo .name{font-weight:600;font-size:14px;margin-bottom:3px}
.repo .desc{font-size:12px;color:var(--text-2);margin-bottom:4px}
.repo .meta{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted)}
.repo .meta span{margin-right:14px}
.repo .stars{font-family:'JetBrains Mono',monospace;color:var(--pyx);font-weight:700;margin-left:12px}

/* Languages */
.lang-bar{height:10px;border-radius:100px;overflow:hidden;display:flex;margin-bottom:16px;background:rgba(255,255,255,.05)}
.lang-seg{height:100%}
.lang-list{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;font-size:12px;font-family:'JetBrains Mono',monospace}
.lang-item{display:flex;align-items:center;gap:6px}
.lang-dot{width:10px;height:10px;border-radius:50%}

.error{display:none;background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.3);border-radius:12px;padding:16px;color:#fca5a5;font-size:13px;margin-bottom:16px}
.error.show{display:block}

.loader{display:none;text-align:center;padding:40px;color:var(--muted);font-family:'JetBrains Mono',monospace;font-size:11px}
.loader.show{display:block}

@media (max-width:700px){main{padding:16px}.profile.show{flex-direction:column;text-align:center}}
</style>
</head>
<body>

<nav>
  <a href="/projects/" class="nav-brand"><span class="dot"></span>PYXORA<span class="studio">GITHUB</span></a>
  <a href="/projects/" class="btn">← PROJECTS</a>
</nav>

<main>
  <div class="page-hd">
    <h1>🐙 GitHub Analyzer</h1>
    <p>GitHub 사용자 분석 · 프로필 · 저장소 TOP 10 · 언어 분포 · 공개 API 사용</p>
  </div>

  <div class="search-bar">
    <input type="text" id="input" placeholder="GitHub username (예: torvalds)" value="torvalds"/>
    <button id="go">분석</button>
  </div>

  <div class="error" id="error"></div>
  <div class="loader" id="loader">데이터 로딩 중...</div>

  <div class="profile" id="profile">
    <img id="avatar" src="" alt=""/>
    <div class="info">
      <div class="name" id="pname"></div>
      <div class="login" id="plogin"></div>
      <div class="bio" id="pbio"></div>
      <div class="meta">
        <div><span class="m">LOCATION</span> <span class="v" id="ploc">—</span></div>
        <div><span class="m">JOINED</span> <span class="v" id="pjoin">—</span></div>
        <div><span class="m">COMPANY</span> <span class="v" id="pcomp">—</span></div>
      </div>
    </div>
  </div>

  <div class="kpis" id="kpis">
    <div class="kpi"><div class="l">팔로워</div><div class="v" id="kFollowers">—</div></div>
    <div class="kpi"><div class="l">팔로잉</div><div class="v" id="kFollowing">—</div></div>
    <div class="kpi"><div class="l">공개 저장소</div><div class="v" id="kRepos">—</div></div>
    <div class="kpi"><div class="l">총 스타</div><div class="v" id="kStars">—</div></div>
  </div>

  <div class="panel" id="langsPanel">
    <h3>언어 분포 (상위 저장소 기준)</h3>
    <div class="lang-bar" id="langBar"></div>
    <div class="lang-list" id="langList"></div>
  </div>

  <div class="panel" id="reposPanel">
    <h3>인기 저장소 TOP 10</h3>
    <div id="reposList"></div>
  </div>
</main>

<script>
const langColors = {
  'JavaScript':'#f7df1e','TypeScript':'#3178c6','Python':'#3572A5','Rust':'#dea584','Go':'#00ADD8',
  'C':'#555','C++':'#f34b7d','Java':'#b07219','Ruby':'#701516','Shell':'#89e051','HTML':'#e34c26',
  'CSS':'#563d7c','Swift':'#F05138','Kotlin':'#A97BFF','Dart':'#00B4AB','PHP':'#4F5D95','Vue':'#41b883',
  'Lua':'#000080','Scala':'#c22d40','Elixir':'#6e4a7e','Haskell':'#5e5086','Jupyter Notebook':'#DA5B0B'
};

async function analyze(){
  const username = document.getElementById('input').value.trim();
  if (!username) return;

  document.getElementById('error').classList.remove('show');
  document.getElementById('profile').classList.remove('show');
  document.getElementById('kpis').classList.remove('show');
  document.getElementById('langsPanel').classList.remove('show');
  document.getElementById('reposPanel').classList.remove('show');
  document.getElementById('loader').classList.add('show');

  try {
    const uRes = await fetch(`https://api.github.com/users/${username}`);
    if (!uRes.ok) throw new Error(`사용자를 찾을 수 없습니다 (${uRes.status})`);
    const user = await uRes.json();

    const rRes = await fetch(`https://api.github.com/users/${username}/repos?per_page=100&sort=updated`);
    const repos = await rRes.json();

    renderProfile(user);
    renderStats(user, repos);
    renderRepos(repos);
    renderLanguages(repos);
  } catch(e){
    document.getElementById('error').textContent = '오류: ' + e.message;
    document.getElementById('error').classList.add('show');
  } finally {
    document.getElementById('loader').classList.remove('show');
  }
}

function renderProfile(u){
  document.getElementById('avatar').src = u.avatar_url;
  document.getElementById('pname').textContent = u.name || u.login;
  document.getElementById('plogin').textContent = '@' + u.login;
  document.getElementById('pbio').textContent = u.bio || '소개 없음';
  document.getElementById('ploc').textContent = u.location || '—';
  document.getElementById('pjoin').textContent = new Date(u.created_at).toLocaleDateString('ko-KR');
  document.getElementById('pcomp').textContent = u.company || '—';
  document.getElementById('profile').classList.add('show');
}

function renderStats(u, repos){
  document.getElementById('kFollowers').textContent = u.followers.toLocaleString();
  document.getElementById('kFollowing').textContent = u.following.toLocaleString();
  document.getElementById('kRepos').textContent = u.public_repos.toLocaleString();
  const stars = repos.reduce((s,r) => s + r.stargazers_count, 0);
  document.getElementById('kStars').textContent = stars.toLocaleString();
  document.getElementById('kpis').classList.add('show');
}

function renderRepos(repos){
  const top = [...repos].sort((a,b) => b.stargazers_count - a.stargazers_count).slice(0, 10);
  document.getElementById('reposList').innerHTML = top.map(r => `
    <div class="repo">
      <div style="flex:1;min-width:0;overflow:hidden">
        <div class="name"><a href="${r.html_url}" target="_blank" rel="noopener">${r.name}</a></div>
        <div class="desc">${r.description ? r.description.slice(0,100) : '(설명 없음)'}</div>
        <div class="meta">
          ${r.language ? `<span>🔵 ${r.language}</span>` : ''}
          <span>🍴 ${r.forks_count}</span>
          <span>📝 ${new Date(r.updated_at).toLocaleDateString('ko-KR')}</span>
        </div>
      </div>
      <div class="stars">★ ${r.stargazers_count.toLocaleString()}</div>
    </div>
  `).join('');
  document.getElementById('reposPanel').classList.add('show');
}

function renderLanguages(repos){
  const langs = {};
  repos.forEach(r => { if (r.language) langs[r.language] = (langs[r.language] || 0) + 1; });
  const total = Object.values(langs).reduce((s,v) => s+v, 0);
  if (!total) return;
  const sorted = Object.entries(langs).sort((a,b) => b[1]-a[1]).slice(0, 8);

  document.getElementById('langBar').innerHTML = sorted.map(([lang, count]) => {
    const pct = (count/total)*100;
    const color = langColors[lang] || '#888';
    return `<div class="lang-seg" style="width:${pct}%;background:${color}" title="${lang} ${pct.toFixed(1)}%"></div>`;
  }).join('');

  document.getElementById('langList').innerHTML = sorted.map(([lang, count]) => {
    const pct = (count/total)*100;
    const color = langColors[lang] || '#888';
    return `<div class="lang-item"><span class="lang-dot" style="background:${color}"></span>${lang} <span style="color:var(--muted);margin-left:auto">${pct.toFixed(1)}%</span></div>`;
  }).join('');
  document.getElementById('langsPanel').classList.add('show');
}

document.getElementById('go').onclick = analyze;
document.getElementById('input').addEventListener('keydown', e => { if (e.key === 'Enter') analyze(); });
analyze();
</script>
</body>
</html>
