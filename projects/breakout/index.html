<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Breakout: Neon · Pyxora Studio</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%23060610'/%3E%3Ctext x='50' y='72' font-family='sans-serif' font-size='68' font-weight='700' fill='%23fbbf24' text-anchor='middle'%3EP%3C/text%3E%3C/svg%3E"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
a,button,.tab,.btn,[role=button]{touch-action:manipulation;-webkit-tap-highlight-color:transparent}
:root{--bg:#06060f;--pyx:#fbbf24;--violet:#7c3aed;--cyan:#06b6d4;--pink:#ec4899;--text:#f5f5f7;--muted:#7a7a8c;--line:rgba(255,255,255,.08);--line-hi:rgba(255,255,255,.16)}
html,body{height:100%;overflow:hidden}
body{font-family:'Space Grotesk',sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column;user-select:none;-webkit-user-select:none}
a{color:inherit;text-decoration:none}
nav{padding:14px 28px;background:rgba(6,6,15,.9);backdrop-filter:blur(24px);border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.nav-brand{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:14px;display:flex;align-items:center;gap:10px}
.nav-brand .dot{width:7px;height:7px;border-radius:50%;background:var(--pyx);box-shadow:0 0 10px var(--pyx)}
.nav-brand .studio{color:var(--muted);font-weight:400;margin-left:4px}
.btn{font-family:'JetBrains Mono',monospace;font-size:11px;padding:8px 14px;border:1px solid var(--line-hi);border-radius:100px;cursor:pointer;background:transparent;color:var(--text);transition:all .3s}
.btn:hover{background:var(--pyx);color:var(--bg);border-color:var(--pyx)}
.hud{display:flex;gap:20px;font-family:'JetBrains Mono',monospace;font-size:12px}
.hud .s{display:flex;flex-direction:column;align-items:center}
.hud .s-l{font-size:9px;color:var(--muted);letter-spacing:1px}
.hud .s-v{font-weight:700;color:var(--pyx);font-size:16px}

.game-wrap{flex:1;display:flex;align-items:center;justify-content:center;position:relative;padding:20px}
canvas{display:block;max-width:100%;max-height:100%;background:#000;border-radius:12px;box-shadow:0 0 60px rgba(124,58,237,.4);touch-action:none}

.overlay{position:absolute;inset:0;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.7);backdrop-filter:blur(8px);z-index:10}
.overlay.show{display:flex}
.overlay-box{background:rgba(12,12,28,.9);border:1px solid var(--line-hi);border-radius:20px;padding:40px;text-align:center;max-width:360px}
.overlay-box h2{font-family:'Space Grotesk',sans-serif;font-size:36px;font-weight:700;margin-bottom:8px;background:linear-gradient(135deg,var(--pink),var(--pyx));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.overlay-box p{color:var(--muted);font-size:12px;margin-bottom:20px;font-family:'JetBrains Mono',monospace;letter-spacing:1px}
.overlay-box .score-big{font-family:'Space Grotesk',sans-serif;font-size:56px;font-weight:700;color:var(--pyx);line-height:1;margin:10px 0}
.overlay-box button{background:var(--pyx);color:#000;border:none;padding:14px 32px;border-radius:100px;font-family:'JetBrains Mono',monospace;font-weight:700;font-size:12px;cursor:pointer;letter-spacing:1px}
</style>
</head>
<body>

<nav>
  <a href="/projects/" class="nav-brand"><span class="dot"></span>PYXORA<span class="studio">BREAKOUT</span></a>
  <div class="hud">
    <div class="s"><div class="s-l">SCORE</div><div class="s-v" id="score">0</div></div>
    <div class="s"><div class="s-l">LIVES</div><div class="s-v" id="lives">3</div></div>
    <div class="s"><div class="s-l">LEVEL</div><div class="s-v" id="level">1</div></div>
  </div>
  <a href="/projects/" class="btn">← PROJECTS</a>
</nav>

<div class="game-wrap">
  <canvas id="game" width="480" height="640"></canvas>
  <div class="overlay" id="overlay">
    <div class="overlay-box">
      <h2 id="ovTitle">READY?</h2>
      <p id="ovSub">CLICK or TAP to start · ← → to move</p>
      <div class="score-big" id="ovScore" style="display:none">0</div>
      <button id="startBtn">시작</button>
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

const state = {
  paddle: { x:W/2-50, y:H-40, w:100, h:12, speed:0 },
  ball: { x:W/2, y:H-60, r:7, vx:0, vy:0, stuck:true },
  bricks: [],
  particles: [],
  score: 0,
  lives: 3,
  level: 1,
  playing: false,
  shake: 0,
};

const colors = ['#fbbf24','#7c3aed','#06b6d4','#ec4899','#10b981'];

function resetBricks(){
  state.bricks = [];
  const cols = 10;
  const rows = Math.min(4 + state.level, 8);
  const pad = 6;
  const bw = (W - pad*(cols+1)) / cols;
  const bh = 20;
  for (let r = 0; r < rows; r++){
    for (let c = 0; c < cols; c++){
      state.bricks.push({
        x: pad + c*(bw+pad),
        y: 60 + r*(bh+pad),
        w: bw, h: bh,
        color: colors[r % colors.length],
        alive: true
      });
    }
  }
}

function reset(){
  state.ball.x = state.paddle.x + state.paddle.w/2;
  state.ball.y = state.paddle.y - 10;
  state.ball.vx = 0;
  state.ball.vy = 0;
  state.ball.stuck = true;
}

function launch(){
  state.ball.vx = (Math.random() - 0.5) * 4;
  state.ball.vy = -5 - state.level * 0.3;
  state.ball.stuck = false;
}

function spawnParticles(x, y, color){
  for (let i = 0; i < 12; i++){
    const a = Math.random() * Math.PI * 2;
    const s = 1 + Math.random() * 3;
    state.particles.push({
      x, y,
      vx: Math.cos(a) * s,
      vy: Math.sin(a) * s,
      life: 30,
      color
    });
  }
}

function updatePaddle(){
  state.paddle.x += state.paddle.speed;
  if (state.paddle.x < 0) state.paddle.x = 0;
  if (state.paddle.x > W - state.paddle.w) state.paddle.x = W - state.paddle.w;
}

function updateBall(){
  if (state.ball.stuck){
    state.ball.x = state.paddle.x + state.paddle.w/2;
    return;
  }
  state.ball.x += state.ball.vx;
  state.ball.y += state.ball.vy;
  // Walls
  if (state.ball.x < state.ball.r || state.ball.x > W - state.ball.r) state.ball.vx *= -1;
  if (state.ball.y < state.ball.r) state.ball.vy *= -1;
  // Paddle
  if (state.ball.y + state.ball.r > state.paddle.y && state.ball.y < state.paddle.y + state.paddle.h &&
      state.ball.x > state.paddle.x && state.ball.x < state.paddle.x + state.paddle.w && state.ball.vy > 0){
    state.ball.vy *= -1;
    const hit = (state.ball.x - (state.paddle.x + state.paddle.w/2)) / (state.paddle.w/2);
    state.ball.vx = hit * 6;
  }
  // Bricks
  for (const b of state.bricks){
    if (!b.alive) continue;
    if (state.ball.x + state.ball.r > b.x && state.ball.x - state.ball.r < b.x + b.w &&
        state.ball.y + state.ball.r > b.y && state.ball.y - state.ball.r < b.y + b.h){
      b.alive = false;
      state.score += 10;
      state.shake = 6;
      spawnParticles(b.x + b.w/2, b.y + b.h/2, b.color);
      // Bounce direction
      const overlapX = Math.min(state.ball.x + state.ball.r - b.x, b.x + b.w - (state.ball.x - state.ball.r));
      const overlapY = Math.min(state.ball.y + state.ball.r - b.y, b.y + b.h - (state.ball.y - state.ball.r));
      if (overlapX < overlapY) state.ball.vx *= -1;
      else state.ball.vy *= -1;
      break;
    }
  }
  // Bottom = lose life
  if (state.ball.y > H){
    state.lives--;
    if (state.lives <= 0){
      gameOver();
    } else {
      reset();
    }
  }
  // Level clear
  if (state.bricks.every(b => !b.alive)){
    state.level++;
    resetBricks();
    reset();
  }
}

function updateParticles(){
  for (let i = state.particles.length-1; i >= 0; i--){
    const p = state.particles[i];
    p.x += p.vx; p.y += p.vy;
    p.vy += 0.15;
    p.life--;
    if (p.life <= 0) state.particles.splice(i, 1);
  }
}

function draw(){
  ctx.save();
  if (state.shake > 0){
    ctx.translate((Math.random()-0.5)*state.shake, (Math.random()-0.5)*state.shake);
    state.shake *= 0.85;
    if (state.shake < 0.5) state.shake = 0;
  }
  // BG
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, H);
  // Grid
  ctx.strokeStyle = 'rgba(124,58,237,.08)';
  ctx.lineWidth = 1;
  for (let x = 0; x < W; x += 40){ ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
  for (let y = 0; y < H; y += 40){ ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }

  // Bricks
  for (const b of state.bricks){
    if (!b.alive) continue;
    ctx.fillStyle = b.color;
    ctx.shadowColor = b.color;
    ctx.shadowBlur = 8;
    ctx.fillRect(b.x, b.y, b.w, b.h);
    ctx.shadowBlur = 0;
  }

  // Paddle
  const grad = ctx.createLinearGradient(state.paddle.x, 0, state.paddle.x + state.paddle.w, 0);
  grad.addColorStop(0, '#06b6d4');
  grad.addColorStop(1, '#7c3aed');
  ctx.fillStyle = grad;
  ctx.shadowColor = '#06b6d4';
  ctx.shadowBlur = 15;
  ctx.fillRect(state.paddle.x, state.paddle.y, state.paddle.w, state.paddle.h);
  ctx.shadowBlur = 0;

  // Ball
  ctx.fillStyle = '#fbbf24';
  ctx.shadowColor = '#fbbf24';
  ctx.shadowBlur = 20;
  ctx.beginPath();
  ctx.arc(state.ball.x, state.ball.y, state.ball.r, 0, Math.PI*2);
  ctx.fill();
  ctx.shadowBlur = 0;

  // Particles
  for (const p of state.particles){
    ctx.fillStyle = p.color;
    ctx.globalAlpha = p.life/30;
    ctx.fillRect(p.x-2, p.y-2, 4, 4);
  }
  ctx.globalAlpha = 1;

  ctx.restore();
}

function loop(){
  if (state.playing){
    updatePaddle();
    updateBall();
    updateParticles();
    draw();
    document.getElementById('score').textContent = state.score;
    document.getElementById('lives').textContent = state.lives;
    document.getElementById('level').textContent = state.level;
  }
  requestAnimationFrame(loop);
}

function gameOver(){
  state.playing = false;
  document.getElementById('ovTitle').textContent = 'GAME OVER';
  document.getElementById('ovScore').style.display = 'block';
  document.getElementById('ovScore').textContent = state.score;
  document.getElementById('ovSub').textContent = 'FINAL SCORE';
  document.getElementById('startBtn').textContent = '다시 시작';
  document.getElementById('overlay').classList.add('show');
}

function startGame(){
  state.score = 0; state.lives = 3; state.level = 1;
  resetBricks();
  reset();
  state.playing = true;
  document.getElementById('overlay').classList.remove('show');
  document.getElementById('ovScore').style.display = 'none';
}

document.getElementById('startBtn').onclick = startGame;

// Keyboard
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft') state.paddle.speed = -7;
  if (e.key === 'ArrowRight') state.paddle.speed = 7;
  if (e.key === ' ' && state.ball.stuck) launch();
});
document.addEventListener('keyup', e => {
  if (e.key === 'ArrowLeft' || e.key === 'ArrowRight') state.paddle.speed = 0;
});

// Mouse/touch
canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  const scale = W / rect.width;
  state.paddle.x = (e.clientX - rect.left) * scale - state.paddle.w/2;
});
canvas.addEventListener('click', () => { if (state.ball.stuck && state.playing) launch(); });
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const scale = W / rect.width;
  state.paddle.x = (e.touches[0].clientX - rect.left) * scale - state.paddle.w/2;
}, {passive:false});
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  if (state.ball.stuck && state.playing) launch();
}, {passive:false});

resetBricks();
reset();
draw();
loop();

// Show start overlay on initial load
document.getElementById('overlay').classList.add('show');
</script>
</body>
</html>
