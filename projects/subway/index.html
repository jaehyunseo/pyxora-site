<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Seoul Subway · Pyxora Studio</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%23060610'/%3E%3Ctext x='50' y='72' font-family='sans-serif' font-size='68' font-weight='700' fill='%23fbbf24' text-anchor='middle'%3EP%3C/text%3E%3C/svg%3E"/>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&family=Space+Grotesk:wght@600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#06060f;--bg-2:#0c0c1c;--surface:#13132a;--pyx:#fbbf24;--violet:#7c3aed;--cyan:#06b6d4;--green:#10b981;--text:#f5f5f7;--text-2:#c4c4d0;--muted:#7a7a8c;--line:rgba(255,255,255,.08);--line-hi:rgba(255,255,255,.16)}
body{font-family:'Pretendard',sans-serif;background:var(--bg);color:var(--text);line-height:1.5;min-height:100vh}
a{color:inherit;text-decoration:none}
nav{position:sticky;top:0;z-index:50;padding:14px 28px;background:rgba(6,6,15,.9);backdrop-filter:blur(24px);border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between}
.nav-brand{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:14px;display:flex;align-items:center;gap:10px}
.nav-brand .dot{width:7px;height:7px;border-radius:50%;background:var(--pyx);box-shadow:0 0 10px var(--pyx)}
.nav-brand .studio{color:var(--muted);font-weight:400;margin-left:4px}
.btn{font-family:'JetBrains Mono',monospace;font-size:11px;padding:8px 14px;border:1px solid var(--line-hi);border-radius:100px;cursor:pointer;background:transparent;color:var(--text);transition:all .3s}
.btn:hover{background:var(--pyx);color:var(--bg);border-color:var(--pyx)}

main{max-width:1280px;margin:0 auto;padding:32px}
.page-hd h1{font-family:'Space Grotesk',sans-serif;font-size:28px;font-weight:700;letter-spacing:-.5px;margin-bottom:4px}
.page-hd p{font-size:12px;color:var(--text-2);margin-bottom:20px}

.controls{display:grid;grid-template-columns:1fr 1fr auto;gap:12px;margin-bottom:20px;align-items:end}
.field label{display:block;font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--muted);margin-bottom:5px;letter-spacing:1px;text-transform:uppercase}
.field select{width:100%;background:var(--surface);border:1px solid var(--line-hi);border-radius:10px;padding:12px 14px;color:var(--text);font-family:'Pretendard',sans-serif;font-size:13px;outline:none}
.field select:focus{border-color:var(--violet)}
.go-btn{background:var(--pyx);color:#000;border:none;padding:12px 24px;border-radius:100px;font-family:'JetBrains Mono',monospace;font-weight:700;font-size:11px;letter-spacing:1px;cursor:pointer}

.result{background:linear-gradient(180deg,var(--surface),var(--bg-2));border:1px solid var(--line);border-radius:16px;padding:24px;margin-bottom:16px}
.result-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:10px}
.result-hd h3{font-family:'Space Grotesk',sans-serif;font-size:18px}
.result-stats{display:flex;gap:24px;font-family:'JetBrains Mono',monospace;font-size:11px}
.result-stats .s{text-align:center}
.result-stats .s-v{font-family:'Space Grotesk',sans-serif;font-size:20px;font-weight:700;color:var(--pyx)}
.result-stats .s-l{font-size:9px;color:var(--muted);letter-spacing:1px;margin-top:2px}

.path-viz{display:flex;flex-wrap:wrap;gap:0;align-items:center;padding:20px 0}
.station{display:flex;flex-direction:column;align-items:center;gap:4px;min-width:80px;position:relative}
.station .dot{width:16px;height:16px;border-radius:50%;border:3px solid #fff;position:relative;z-index:2}
.station .name{font-size:11px;color:var(--text);text-align:center;max-width:80px;margin-top:4px}
.station .line-no{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--muted);margin-top:2px}
.station.transfer .dot{width:22px;height:22px;background:#fff;border:4px solid var(--pyx)}
.connector{flex:1;height:3px;min-width:16px;margin-top:-24px}

.lines{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px}
.line-chip{font-family:'JetBrains Mono',monospace;font-size:10px;padding:6px 12px;border-radius:100px;font-weight:700}

@media (max-width:800px){main{padding:16px}.controls{grid-template-columns:1fr}.path-viz{flex-direction:column;align-items:flex-start}.connector{width:3px;height:20px;margin:0 0 0 30px}.station{flex-direction:row;gap:12px;min-width:0}.station .name{text-align:left}}
</style>
</head>
<body>

<nav>
  <a href="/projects/" class="nav-brand"><span class="dot"></span>PYXORA<span class="studio">SUBWAY</span></a>
  <a href="/projects/" class="btn">← PROJECTS</a>
</nav>

<main>
  <div class="page-hd">
    <h1>🚇 Seoul Subway Pathfinder</h1>
    <p>서울 지하철 1~9호선 최단 경로 탐색 · Dijkstra 알고리즘 · 환승 정보</p>
  </div>

  <div class="controls">
    <div class="field"><label>출발역</label><select id="from"></select></div>
    <div class="field"><label>도착역</label><select id="to"></select></div>
    <button class="go-btn" id="goBtn">경로 찾기</button>
  </div>

  <div class="result" id="result" style="display:none">
    <div class="result-hd">
      <h3 id="resultTitle">경로</h3>
      <div class="result-stats">
        <div class="s"><div class="s-v" id="stNum">0</div><div class="s-l">정거장</div></div>
        <div class="s"><div class="s-v" id="transfers">0</div><div class="s-l">환승</div></div>
        <div class="s"><div class="s-v" id="time">0분</div><div class="s-l">예상 시간</div></div>
      </div>
    </div>
    <div class="path-viz" id="pathViz"></div>
  </div>
</main>

<script>
// Simplified Seoul subway graph (30 stations, 1-4 lines)
const lineColors = { 1:'#0052A4', 2:'#00A84D', 3:'#EF7C1C', 4:'#00A5DE', 5:'#996CAC', 7:'#747F00' };

const stations = {
  '서울역':        [1,4],
  '시청':         [1,2],
  '종각':         [1],
  '종로3가':      [1,3,5],
  '동대문':       [1,4],
  '청량리':       [1],
  '을지로입구':    [2],
  '을지로3가':    [2,3],
  '을지로4가':    [2,5],
  '동대문역사문화공원': [2,4,5],
  '신당':         [2,6],
  '왕십리':       [2,5],
  '한양대':       [2],
  '강변':         [2],
  '잠실':         [2],
  '강남':         [2],
  '신논현':       [7],
  '교대':         [2,3],
  '사당':         [2,4],
  '이수':         [4,7],
  '충무로':       [3,4],
  '안국':         [3],
  '경복궁':       [3],
  '독립문':       [3],
  '홍제':         [3],
  '혜화':         [4],
  '한성대입구':   [4],
  '명동':         [4],
  '회현':         [4],
  '합정':         [2,6],
  '홍대입구':      [2],
};

// Adjacency (line, next_station)
const edges = {
  '서울역':[['시청',1],['남영',1],['회현',4],['숙대입구',4]],
  '시청':[['서울역',1],['종각',1],['을지로입구',2]],
  '종각':[['시청',1],['종로3가',1]],
  '종로3가':[['종각',1],['동대문',1],['안국',3],['을지로3가',3],['동대문역사문화공원',5]],
  '동대문':[['종로3가',1],['청량리',1],['혜화',4],['동대문역사문화공원',4]],
  '청량리':[['동대문',1]],
  '을지로입구':[['시청',2],['을지로3가',2]],
  '을지로3가':[['을지로입구',2],['을지로4가',2],['종로3가',3],['충무로',3]],
  '을지로4가':[['을지로3가',2],['동대문역사문화공원',2],['동대문역사문화공원',5]],
  '동대문역사문화공원':[['을지로4가',2],['신당',2],['동대문',4],['충무로',4],['종로3가',5]],
  '신당':[['동대문역사문화공원',2],['왕십리',2]],
  '왕십리':[['신당',2],['한양대',2]],
  '한양대':[['왕십리',2],['강변',2]],
  '강변':[['한양대',2],['잠실',2]],
  '잠실':[['강변',2],['강남',2]],
  '강남':[['잠실',2],['교대',2],['신논현',7]],
  '신논현':[['강남',7],['이수',7]],
  '교대':[['강남',2],['사당',2],['충무로',3]],
  '사당':[['교대',2],['이수',4]],
  '이수':[['사당',4],['신논현',7]],
  '충무로':[['을지로3가',3],['동대문역사문화공원',4],['안국',3]],
  '안국':[['종로3가',3],['경복궁',3]],
  '경복궁':[['안국',3],['독립문',3]],
  '독립문':[['경복궁',3],['홍제',3]],
  '홍제':[['독립문',3]],
  '혜화':[['동대문',4],['한성대입구',4]],
  '한성대입구':[['혜화',4]],
  '명동':[['회현',4],['충무로',4]],
  '회현':[['서울역',4],['명동',4]],
  '합정':[['홍대입구',2]],
  '홍대입구':[['합정',2]],
};

// Populate dropdowns
const stList = Object.keys(stations).sort();
const fromSel = document.getElementById('from'), toSel = document.getElementById('to');
stList.forEach(s => {
  const o1 = document.createElement('option'); o1.value = s; o1.textContent = s; fromSel.appendChild(o1);
  const o2 = document.createElement('option'); o2.value = s; o2.textContent = s; toSel.appendChild(o2);
});
fromSel.value = '서울역';
toSel.value = '강남';

// Dijkstra-like BFS with transfer penalty
function findPath(start, end){
  if (!edges[start] || !edges[end]) return null;
  const visited = new Set();
  const queue = [{ station:start, path:[{station:start, line:null}], cost:0, curLine:null }];
  let best = null;
  while (queue.length){
    queue.sort((a,b) => a.cost - b.cost);
    const cur = queue.shift();
    if (cur.station === end){
      if (!best || cur.cost < best.cost) best = cur;
      continue;
    }
    const key = cur.station + '|' + cur.curLine;
    if (visited.has(key)) continue;
    visited.add(key);
    const nexts = edges[cur.station] || [];
    for (const [next, line] of nexts){
      const transferCost = (cur.curLine && cur.curLine !== line) ? 3 : 0;
      queue.push({
        station: next,
        path: [...cur.path, { station:next, line }],
        cost: cur.cost + 2 + transferCost,
        curLine: line
      });
    }
  }
  return best;
}

function render(result, start, end){
  if (!result){ alert('경로를 찾을 수 없습니다'); return; }
  const rEl = document.getElementById('result');
  rEl.style.display = 'block';
  document.getElementById('resultTitle').textContent = `${start} → ${end}`;
  const transfers = new Set(result.path.filter(p => p.line).map(p => p.line)).size - 1;
  document.getElementById('stNum').textContent = result.path.length;
  document.getElementById('transfers').textContent = Math.max(0, transfers);
  document.getElementById('time').textContent = Math.round(result.cost * 1.5) + '분';

  document.getElementById('pathViz').innerHTML = result.path.map((p, i) => {
    const isFirst = i === 0;
    const isLast = i === result.path.length - 1;
    const transferHere = p.line && i > 0 && result.path[i-1].line && result.path[i-1].line !== p.line;
    const color = p.line ? lineColors[p.line] : '#fbbf24';
    return `
      ${i > 0 ? `<div class="connector" style="background:${color}"></div>` : ''}
      <div class="station ${transferHere || isFirst || isLast ? 'transfer' : ''}">
        <div class="dot" style="background:${color};border-color:#fff"></div>
        <div class="name">${p.station}</div>
        ${p.line ? `<div class="line-no" style="color:${color}">${p.line}호선</div>` : ''}
      </div>
    `;
  }).join('');
}

document.getElementById('goBtn').onclick = () => {
  const f = fromSel.value, t = toSel.value;
  if (f === t){ alert('출발역과 도착역이 같습니다'); return; }
  const result = findPath(f, t);
  render(result, f, t);
};

// Initial run
document.getElementById('goBtn').click();
</script>
</body>
</html>
