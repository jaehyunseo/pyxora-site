<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<meta name="description" content="Palette Forge — Extract color palettes from any image. A designer tool by Pyxora Studio." />
<title>Palette Forge · Pyxora Studio</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%23060610'/%3E%3Ctext x='50' y='72' font-family='sans-serif' font-size='68' font-weight='700' fill='%23fbbf24' text-anchor='middle'%3EP%3C/text%3E%3C/svg%3E" />
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;700&family=Space+Grotesk:wght@500;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
a,button,.tab,.btn,[role=button]{touch-action:manipulation;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#06060f;--surface:#13132a;--violet:#7c3aed;--violet-2:#a855f7;
  --pyx:#fbbf24;--cyan:#06b6d4;--text:#f5f5f7;--text-2:#c4c4d0;--muted:#7a7a8c;
  --line:rgba(255,255,255,.08);--line-hi:rgba(255,255,255,.16);
  --ease:cubic-bezier(.22,1,.36,1);
}
body{
  font-family:'Pretendard','Space Grotesk',system-ui,sans-serif;
  background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh;
}
body::before{
  content:"";position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(ellipse at top left,rgba(124,58,237,.2),transparent 60%),
    radial-gradient(ellipse at bottom right,rgba(6,182,212,.15),transparent 60%);
}
a{color:inherit;text-decoration:none}

/* Nav */
nav{
  width:100%;padding:16px 24px;
  display:flex;justify-content:space-between;align-items:center;
  backdrop-filter:blur(20px);background:rgba(6,6,15,.7);
  border-bottom:1px solid var(--line);
  position:sticky;top:0;z-index:10;
}
.brand{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;display:flex;align-items:center;gap:8px}
.brand .dot{width:6px;height:6px;background:var(--pyx);border-radius:50%;box-shadow:0 0 8px var(--pyx)}
.brand .muted{color:var(--muted);font-weight:400}
.back{font-family:'JetBrains Mono',monospace;font-size:11px;padding:8px 14px;border:1px solid var(--line-hi);border-radius:100px;transition:all .2s}
.back:hover{background:var(--pyx);color:var(--bg);border-color:var(--pyx)}

/* Layout */
.container{max-width:1200px;margin:0 auto;padding:40px 24px 80px;position:relative;z-index:2}
header.page-header{text-align:center;margin-bottom:48px}
header.page-header .eyebrow{
  display:inline-block;font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:2px;
  padding:6px 14px;border:1px solid rgba(251,191,36,.3);background:rgba(251,191,36,.05);
  border-radius:100px;color:var(--pyx);margin-bottom:20px;
}
header.page-header h1{
  font-family:'Space Grotesk',sans-serif;
  font-size:clamp(44px,7vw,80px);font-weight:700;letter-spacing:-.03em;line-height:.95;
  margin-bottom:16px;
  background:linear-gradient(180deg,#fff 40%,var(--violet-2) 80%,var(--pyx) 100%);
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
}
header.page-header p{color:var(--text-2);font-size:17px;max-width:560px;margin:0 auto}

/* Upload area */
.dropzone{
  border:2px dashed var(--line-hi);border-radius:24px;
  padding:60px 24px;text-align:center;cursor:pointer;
  transition:all .3s var(--ease);
  background:rgba(19,19,42,.3);backdrop-filter:blur(10px);
  margin-bottom:32px;
}
.dropzone:hover,.dropzone.drag{
  border-color:var(--pyx);background:rgba(251,191,36,.05);
  transform:translateY(-2px);
}
.dropzone svg{width:48px;height:48px;margin-bottom:16px;color:var(--pyx);opacity:.6}
.dropzone h3{font-family:'Space Grotesk',sans-serif;font-size:22px;margin-bottom:8px;font-weight:600}
.dropzone p{color:var(--muted);font-size:14px;font-family:'JetBrains Mono',monospace}
.dropzone input{display:none}

/* Preset samples */
.samples{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:40px}
.samples button{
  padding:8px 16px;font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.5px;
  background:rgba(19,19,42,.6);border:1px solid var(--line);border-radius:100px;
  color:var(--text-2);cursor:pointer;transition:all .2s;
}
.samples button:hover{border-color:var(--line-hi);color:var(--text)}

/* Results */
.result{display:none;gap:24px;grid-template-columns:1fr 1fr;align-items:start}
.result.show{display:grid}
.preview{
  border-radius:16px;overflow:hidden;border:1px solid var(--line);
  background:#000;
}
.preview img{width:100%;display:block}
.palette{
  background:rgba(19,19,42,.5);backdrop-filter:blur(10px);
  border:1px solid var(--line);border-radius:16px;padding:24px;
}
.palette-label{
  font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--pyx);
  letter-spacing:1.5px;margin-bottom:18px;
}
.swatch-list{display:flex;flex-direction:column;gap:10px}
.swatch{
  display:flex;align-items:center;gap:14px;
  padding:14px 16px;border-radius:12px;
  background:rgba(0,0,0,.4);border:1px solid var(--line);
  cursor:pointer;transition:all .2s var(--ease);
}
.swatch:hover{border-color:var(--line-hi);transform:translateX(4px)}
.swatch.copied{border-color:var(--pyx)}
.swatch-color{
  width:44px;height:44px;border-radius:10px;flex-shrink:0;
  border:1px solid rgba(255,255,255,.12);
  box-shadow:0 4px 12px rgba(0,0,0,.3);
}
.swatch-info{flex:1;min-width:0}
.swatch-hex{
  font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:700;
  letter-spacing:.5px;color:var(--text);
}
.swatch-meta{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);margin-top:2px}
.swatch-copy{
  font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);
  text-transform:uppercase;letter-spacing:1px;
}
.swatch.copied .swatch-copy{color:var(--pyx)}

.export-row{
  margin-top:20px;padding-top:20px;border-top:1px solid var(--line);
  display:flex;gap:10px;flex-wrap:wrap;
}
.export-row button{
  flex:1;padding:12px 14px;
  font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;letter-spacing:.5px;
  background:transparent;border:1px solid var(--line-hi);border-radius:10px;
  color:var(--text);cursor:pointer;transition:all .2s;
}
.export-row button:hover{background:var(--pyx);color:var(--bg);border-color:var(--pyx)}

/* Toast */
.toast{
  position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(80px);
  background:var(--pyx);color:var(--bg);
  padding:12px 24px;border-radius:100px;font-weight:700;font-size:13px;
  font-family:'JetBrains Mono',monospace;letter-spacing:.5px;
  z-index:100;box-shadow:0 20px 40px rgba(251,191,36,.4);
  opacity:0;transition:all .4s var(--ease);
}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}

@media (max-width:720px){
  .container{padding:24px 16px 60px}
  .result.show{grid-template-columns:1fr}
  .dropzone{padding:40px 20px}
  .export-row{flex-direction:column}
}
</style>
</head>
<body>

<nav>
  <a href="/" class="brand"><span class="dot"></span>PYXORA<span class="muted">&nbsp;STUDIO</span></a>
  <a href="/projects/" class="back">← Projects</a>
</nav>

<div class="container">
  <header class="page-header">
    <div class="eyebrow">· PALETTE FORGE</div>
    <h1>Extract the<br>soul of an image.</h1>
    <p>이미지 한 장이면 충분합니다. 우리의 k-means 알고리즘이 주요 색상을 찾아내어 디자이너 친화적인 팔레트로 변환합니다.</p>
  </header>

  <label class="dropzone" id="dropzone">
    <input type="file" id="fileInput" accept="image/*">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12"/>
    </svg>
    <h3>Drop an image here</h3>
    <p>또는 클릭해서 선택 · PNG, JPG, WEBP</p>
  </label>

  <div class="samples">
    <button data-sample="sunset">🌅 Sunset</button>
    <button data-sample="ocean">🌊 Ocean</button>
    <button data-sample="forest">🌲 Forest</button>
    <button data-sample="neon">💫 Neon</button>
  </div>

  <div class="result" id="result">
    <div class="preview">
      <img id="previewImg" alt="Uploaded">
    </div>
    <div class="palette">
      <div class="palette-label">· EXTRACTED PALETTE — 6 COLORS</div>
      <div class="swatch-list" id="swatchList"></div>
      <div class="export-row">
        <button id="exportCSS">CSS VARS</button>
        <button id="exportJSON">JSON</button>
        <button id="exportImage">PNG</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast">Copied!</div>

<script>
(() => {
  const dropzone = document.getElementById('dropzone');
  const fileInput = document.getElementById('fileInput');
  const result = document.getElementById('result');
  const previewImg = document.getElementById('previewImg');
  const swatchList = document.getElementById('swatchList');
  const toast = document.getElementById('toast');
  let currentPalette = [];

  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 1800);
  }

  // K-means clustering for color extraction
  function kMeans(pixels, k, maxIter = 20) {
    // Initialize with random pixels
    let centroids = [];
    const used = new Set();
    while (centroids.length < k) {
      const idx = Math.floor(Math.random() * pixels.length);
      if (!used.has(idx)) {
        used.add(idx);
        centroids.push([...pixels[idx]]);
      }
    }

    let assignments = new Array(pixels.length).fill(0);
    for (let iter = 0; iter < maxIter; iter++) {
      let changed = false;
      // Assign
      for (let i = 0; i < pixels.length; i++) {
        let minDist = Infinity, best = 0;
        for (let c = 0; c < k; c++) {
          const dr = pixels[i][0] - centroids[c][0];
          const dg = pixels[i][1] - centroids[c][1];
          const db = pixels[i][2] - centroids[c][2];
          const d = dr*dr + dg*dg + db*db;
          if (d < minDist) { minDist = d; best = c; }
        }
        if (assignments[i] !== best) { changed = true; assignments[i] = best; }
      }
      if (!changed && iter > 0) break;
      // Update
      const sums = Array.from({length:k}, () => [0,0,0,0]);
      for (let i = 0; i < pixels.length; i++) {
        const c = assignments[i];
        sums[c][0] += pixels[i][0];
        sums[c][1] += pixels[i][1];
        sums[c][2] += pixels[i][2];
        sums[c][3]++;
      }
      for (let c = 0; c < k; c++) {
        if (sums[c][3] > 0) {
          centroids[c] = [
            Math.round(sums[c][0] / sums[c][3]),
            Math.round(sums[c][1] / sums[c][3]),
            Math.round(sums[c][2] / sums[c][3])
          ];
        }
      }
    }
    // Count cluster sizes for sorting
    const counts = new Array(k).fill(0);
    for (let i = 0; i < pixels.length; i++) counts[assignments[i]]++;
    return centroids
      .map((c, i) => ({ rgb: c, count: counts[i] }))
      .sort((a, b) => b.count - a.count);
  }

  function rgbToHex(r, g, b) {
    return '#' + [r,g,b].map(x => x.toString(16).padStart(2,'0').toUpperCase()).join('');
  }

  function luminance(r, g, b) {
    const a = [r,g,b].map(v => {
      v /= 255;
      return v <= 0.03928 ? v/12.92 : Math.pow((v+0.055)/1.055, 2.4);
    });
    return a[0]*0.2126 + a[1]*0.7152 + a[2]*0.0722;
  }

  async function processImage(src) {
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = () => {
      previewImg.src = src;
      // Downsample for performance
      const MAX = 150;
      const scale = Math.min(1, MAX / Math.max(img.width, img.height));
      const w = Math.floor(img.width * scale);
      const h = Math.floor(img.height * scale);
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, w, h);
      const data = ctx.getImageData(0, 0, w, h).data;
      const pixels = [];
      for (let i = 0; i < data.length; i += 4) {
        if (data[i+3] > 128) pixels.push([data[i], data[i+1], data[i+2]]);
      }
      const clusters = kMeans(pixels, 6);
      currentPalette = clusters.map(c => ({
        hex: rgbToHex(...c.rgb),
        rgb: c.rgb,
        count: c.count,
      }));
      renderPalette();
      result.classList.add('show');
    };
    img.src = src;
  }

  function renderPalette() {
    swatchList.innerHTML = '';
    currentPalette.forEach((color, i) => {
      const lum = luminance(...color.rgb);
      const label = lum > 0.5 ? 'LIGHT' : 'DARK';
      const el = document.createElement('div');
      el.className = 'swatch';
      el.innerHTML = `
        <div class="swatch-color" style="background:${color.hex}"></div>
        <div class="swatch-info">
          <div class="swatch-hex">${color.hex}</div>
          <div class="swatch-meta">RGB(${color.rgb.join(', ')}) · ${label}</div>
        </div>
        <div class="swatch-copy">TAP TO COPY</div>
      `;
      el.addEventListener('click', () => {
        navigator.clipboard.writeText(color.hex);
        el.classList.add('copied');
        showToast(`${color.hex} copied`);
        setTimeout(() => el.classList.remove('copied'), 1500);
      });
      swatchList.appendChild(el);
    });
  }

  // File input
  fileInput.addEventListener('change', e => {
    const file = e.target.files[0];
    if (file) {
      const reader = new FileReader();
      reader.onload = ev => processImage(ev.target.result);
      reader.readAsDataURL(file);
    }
  });

  // Drag & drop
  ['dragenter','dragover'].forEach(ev => {
    dropzone.addEventListener(ev, e => {
      e.preventDefault();
      dropzone.classList.add('drag');
    });
  });
  ['dragleave','drop'].forEach(ev => {
    dropzone.addEventListener(ev, e => {
      e.preventDefault();
      dropzone.classList.remove('drag');
    });
  });
  dropzone.addEventListener('drop', e => {
    const file = e.dataTransfer.files[0];
    if (file && file.type.startsWith('image/')) {
      const reader = new FileReader();
      reader.onload = ev => processImage(ev.target.result);
      reader.readAsDataURL(file);
    }
  });

  // Sample gradients (generated locally, no external fetch)
  const samples = {
    sunset: ['#0f0c29','#302b63','#ff6b6b','#feca57','#ff9ff3','#fff'],
    ocean:  ['#000428','#004e92','#00b4db','#0083b0','#e0f7fa','#fff'],
    forest: ['#134e5e','#71b280','#2d5016','#8ba88b','#d7e8ba','#ffd700'],
    neon:   ['#0f0c29','#7c3aed','#ec4899','#06b6d4','#fbbf24','#fff'],
  };

  function createSample(colors) {
    const canvas = document.createElement('canvas');
    canvas.width = 400; canvas.height = 300;
    const ctx = canvas.getContext('2d');
    const grad = ctx.createLinearGradient(0, 0, 400, 300);
    colors.forEach((c, i) => grad.addColorStop(i / (colors.length - 1), c));
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, 400, 300);
    // Add some shapes for variety
    for (let i = 0; i < 5; i++) {
      ctx.fillStyle = colors[i % colors.length] + '88';
      ctx.beginPath();
      ctx.arc(Math.random() * 400, Math.random() * 300, 30 + Math.random() * 80, 0, Math.PI*2);
      ctx.fill();
    }
    return canvas.toDataURL();
  }

  document.querySelectorAll('.samples button').forEach(btn => {
    btn.addEventListener('click', () => {
      const name = btn.dataset.sample;
      processImage(createSample(samples[name]));
    });
  });

  // Exports
  document.getElementById('exportCSS').addEventListener('click', () => {
    const css = ':root {\n' + currentPalette.map((c, i) =>
      `  --color-${i + 1}: ${c.hex};`
    ).join('\n') + '\n}';
    navigator.clipboard.writeText(css);
    showToast('CSS copied');
  });

  document.getElementById('exportJSON').addEventListener('click', () => {
    const json = JSON.stringify(currentPalette.map(c => ({ hex: c.hex, rgb: c.rgb })), null, 2);
    navigator.clipboard.writeText(json);
    showToast('JSON copied');
  });

  document.getElementById('exportImage').addEventListener('click', () => {
    const canvas = document.createElement('canvas');
    canvas.width = 1200; canvas.height = 200;
    const ctx = canvas.getContext('2d');
    const w = 1200 / currentPalette.length;
    currentPalette.forEach((c, i) => {
      ctx.fillStyle = c.hex;
      ctx.fillRect(i * w, 0, w, 200);
      ctx.fillStyle = luminance(...c.rgb) > 0.5 ? '#000' : '#fff';
      ctx.font = 'bold 20px monospace';
      ctx.textAlign = 'center';
      ctx.fillText(c.hex, i * w + w/2, 180);
    });
    const link = document.createElement('a');
    link.download = 'palette.png';
    link.href = canvas.toDataURL();
    link.click();
    showToast('PNG downloaded');
  });

  // Auto-load first sample on init
  processImage(createSample(samples.neon));
})();
</script>

</body>
</html>
