<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<meta name="robots" content="noindex, nofollow"/>
<title>404 · Pyxora Studio</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%23060610'/%3E%3Ctext x='50' y='72' font-family='sans-serif' font-size='68' font-weight='700' fill='%23fbbf24' text-anchor='middle'%3EP%3C/text%3E%3C/svg%3E"/>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700;800&family=Space+Grotesk:wght@700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
a,button{touch-action:manipulation;-webkit-tap-highlight-color:transparent}
:root{--bg:#06060f;--pyx:#fbbf24;--violet:#7c3aed;--text:#f5f5f7;--muted:#7a7a8c;--line:rgba(255,255,255,.08);--line-hi:rgba(255,255,255,.16)}
body{font-family:'Pretendard',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px 20px}
body::before{content:"";position:fixed;inset:0;z-index:0;pointer-events:none;background:radial-gradient(ellipse 60% 40% at 50% 30%,rgba(124,58,237,.2),transparent 60%),radial-gradient(ellipse 50% 30% at 50% 70%,rgba(251,191,36,.1),transparent 60%)}
.wrap{position:relative;z-index:2;text-align:center;max-width:480px}
.code{font-family:'Space Grotesk',sans-serif;font-size:clamp(96px,18vw,168px);font-weight:800;line-height:.9;letter-spacing:-6px;background:linear-gradient(180deg,#fff 0%,var(--violet) 60%,var(--pyx) 100%);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:16px}
h1{font-family:'Space Grotesk',sans-serif;font-size:28px;font-weight:700;letter-spacing:-.5px;margin-bottom:12px}
p{color:var(--muted);font-size:14px;line-height:1.7;margin-bottom:28px;font-family:'JetBrains Mono',monospace;letter-spacing:.5px}
.actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.btn{font-family:'JetBrains Mono',monospace;font-size:11px;padding:12px 22px;border:1px solid var(--line-hi);border-radius:100px;color:var(--text);text-decoration:none;letter-spacing:1px;transition:all .3s cubic-bezier(.22,1,.36,1)}
.btn:hover{background:var(--pyx);color:var(--bg);border-color:var(--pyx)}
.btn.primary{background:var(--pyx);color:var(--bg);border-color:var(--pyx);font-weight:700}
.btn.primary:hover{transform:translateY(-2px);box-shadow:0 15px 30px rgba(251,191,36,.3)}
</style>
</head>
<body>
<div class="wrap">
  <div class="code">404</div>
  <h1>Page not forged.</h1>
  <p>찾으시는 페이지는 이 작업실에 없습니다.<br>다른 작품을 둘러보시겠어요?</p>
  <div class="actions">
    <a href="/" class="btn primary">🏠 HOME</a>
    <a href="/projects/" class="btn">🎨 PROJECTS</a>
  </div>
</div>
</body>
</html>
